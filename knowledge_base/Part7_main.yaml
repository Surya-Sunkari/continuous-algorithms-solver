source: "Part7_main.pdf"
lecture_number: 7
title: "Polynomial Approximations"
items:
  - type: definition
    number: "—"
    name: "Krylov subspace"
    statement: |
      For a matrix $\mathbf{K} \in \mathbb{S}^{d \times d}$ and vector $\mathbf{v} \in \mathbb{R}^d$, the order-$(t+1)$ Krylov subspace generated by $(\mathbf{K}, \mathbf{v})$ is
      \[
        \mathcal{K}_t := \mathrm{Span}\{\mathbf{v}, \mathbf{K}\mathbf{v}, \mathbf{K}^2\mathbf{v}, \ldots, \mathbf{K}^t\mathbf{v}\} = \{p(\mathbf{K})\mathbf{v} \mid p \text{ is a degree-}k' \leq k \text{ polynomial}\}.
      \]
      Krylov methods (or Krylov iteration) are iterative methods whose iterates $\{\mathbf{x}_t\}_{t \geq 0}$ lie in $\mathcal{K}_t$.
    context: "Fundamental object in numerical linear algebra; underlies the conjugate gradient method and the Lanczos iteration. Converts approximate polynomial approximation of a matrix function into an iterative algorithm."

  - type: definition
    number: "—"
    name: "Chebyshev polynomials (first kind)"
    statement: |
      Define $T_0(x) := 1$, $T_1(x) := x$, and for $k \geq 2$:
      \[
        T_k(x) := 2x T_{k-1}(x) - T_{k-2}(x).
      \]
      These are the degree-$k$ Chebyshev polynomials of the first kind. Over $[-1,1]$ they satisfy the trigonometric identity
      \[
        T_k(\cos\theta) = \cos(k\theta) \quad \text{for all } \theta \in [-\pi, \pi],
      \]
      and hence $|T_k(x)| \leq 1$ for all $x \in [-1,1]$.
    context: "Central tool in polynomial approximation theory. Admits simple recursive computation, is bounded in $[-1,1]$, forms an orthogonal basis, and grows rapidly outside $[-1,1]$. Basis for momentum methods, conjugate gradient, and the Lanczos method."
    proof_notes:
      - label: "(5)"
        content: |
          $T_k(x) := 2x T_{k-1}(x) - T_{k-2}(x)$
        description: "Recursive definition of Chebyshev polynomials; used in the proof of Lemma 1 to establish the key inductive step."
      - label: "(6)"
        content: |
          $T_k(\cos\theta) = \cos(k\theta)$ for all $\theta \in [-\pi, \pi]$.
        description: "Trigonometric representation; implies $|T_k(x)| \leq 1$ on $[-1,1]$ and underlies the orthogonality relation."

  - type: definition
    number: "—"
    name: "Chebyshev basis decomposition and coefficients"
    statement: |
      Any Lipschitz function $f : [-1,1] \to \mathbb{R}$ has a unique decomposition
      \[
        f(x) = \sum_{i=0}^{\infty} a_i T_i(x)
      \]
      in the Chebyshev basis, with explicit Chebyshev coefficients
      \[
        a_i = \frac{1}{\pi\iota} \int_{|z|=1} z^{-(i+1)} f\!\left(\tfrac{1}{2}(z+z^{-1})\right) \mathrm{d}z.
      \]
    context: "Used in Trefethen's theorem (Theorem 3) and Lemma 3 to bound uniform approximation error via coefficient decay. Exponential decay of $a_i$ is guaranteed for analytic functions."
    proof_notes:
      - label: "(7)"
        content: |
          $f(x) = \sum_{i=0}^{\infty} a_i T_i(x)$
        description: "Chebyshev series expansion; truncating at degree $k$ yields the approximating polynomial analyzed in Lemma 3."
      - label: "(8)"
        content: |
          $a_i = \frac{1}{\pi\iota} \int_{|z|=1} z^{-(i+1)} f\!\left(\tfrac{1}{2}(z+z^{-1})\right) \mathrm{d}z$
        description: "Contour integral formula for Chebyshev coefficients; the integration contour is expanded to $|z|=\rho$ in the proof of Theorem 3 to obtain decay bounds."

  - type: definition
    number: "—"
    name: "Bernstein ellipse"
    statement: |
      For $\rho > 1$, the Bernstein ellipse of radius $\rho$ is
      \[
        E_\rho := \left\{ \tfrac{1}{2}(z + z^{-1}) \;\middle|\; |z| = \rho \right\} \subseteq \mathbb{C}.
      \]
      Its major axis has length $\rho + \rho^{-1}$.
    context: "The natural domain for analytic continuation of functions on $[-1,1]$; used in Theorem 3 to characterize the rate of decay of Chebyshev coefficients."

  - type: definition
    number: "—"
    name: "Best polynomial approximation error $\delta_k$"
    statement: |
      For a function $f$ and matrix $\mathbf{A} \in \mathbb{S}^{d \times d}$, define
      \[
        \delta_k := \min_{p \in \mathcal{P}_{k-1}} \left( \max_{x \in [\lambda_{\min}(\mathbf{A}),\, \lambda_{\max}(\mathbf{A})]} |p(x) - f(x)| \right).
      \]
    context: "Measures the best uniform approximation of $f$ by degree-$(k-1)$ polynomials on the spectral interval of $\mathbf{A}$. Governs the error guarantee of the Lanczos method (Theorem 1)."

  - type: remark
    number: "—"
    name: "Observation 1"
    statement: |
      Let $p(x) = \sum_{i=0}^k c_i x^i$ be a degree-$k$ polynomial, let $\mathbf{M} \in \mathbb{S}^{d \times d}$, and let $v \in \mathbb{R}^d$. We can compute $p(\mathbf{M})v$ in time $O(\mathcal{T}_{\mathrm{mv}}(\mathbf{M}) \cdot k)$, where $p(\mathbf{M}) := \sum_{i=0}^k c_i \mathbf{M}^i$.
    context: "Core motivation for polynomial approximation in algorithm design: approximating a matrix function $f(\mathbf{M})$ by a polynomial $p(\mathbf{M})$ of degree $k$ reduces the cost to $k$ matrix-vector products."

  - type: theorem
    number: "1"
    name: "Lanczos method (informal, MMS18)"
    statement: |
      There is an algorithm (the Lanczos method) which takes as input $\mathbf{A} \in \mathbb{S}^{d \times d}$ with $\|\mathbf{A}\|_{\mathrm{op}} = \mathrm{poly}(d)$, $k \in \mathbb{N}$, $\epsilon \in (0,1)$, and a function $f$ whose domain contains $[\lambda_{\min}(\mathbf{A}) - \epsilon, \lambda_{\max}(\mathbf{A}) + \epsilon]$ and whose range is $\mathrm{poly}(d)$. The algorithm runs in time $\widetilde{O}(\mathcal{T}_{\mathrm{mv}}(\mathbf{A}) \cdot k)$, uses $O(\log(\frac{d}{\epsilon}))$ bits of precision, and returns $\mathbf{y}$ satisfying
      \[
        \|f(\mathbf{A})\mathbf{x} - \mathbf{y}\|_2 \leq O(k \cdot \delta_k + \epsilon)\|\mathbf{x}\|_2,
      \]
      where
      \[
        \delta_k := \min_{p \in \mathcal{P}_{k-1}} \left( \max_{x \in [\lambda_{\min}(\mathbf{A})-\epsilon,\, \lambda_{\max}(\mathbf{A})+\epsilon]} |p(x) - f(x)| \right).
      \]
    context: "The main algorithmic result for approximately applying a matrix function via Krylov iteration. To bound the Lanczos error, it suffices to exhibit any polynomial that approximates $f$ well on the spectral interval — the polynomial need not be explicitly computed."
    proof_notes:
      - label: "(9)"
        content: |
          $\mathbf{A}^i \mathbf{x} = \mathbf{Q}\mathbf{Q}^\top \mathbf{A}^i \mathbf{x} = \mathbf{Q}\mathbf{T}^i \mathbf{Q}^\top \mathbf{x}$ for $i < k$,
          where $\mathbf{Q} \in \mathbb{R}^{d \times k}$ has $\mathbf{Q}^\top \mathbf{Q} = \mathbf{I}_k$, $\mathbf{Q}$ spans $\mathcal{K}_{k-1}$, and $\mathbf{T} := \mathbf{Q}^\top \mathbf{A} \mathbf{Q}$ is tridiagonal.
        description: "Key identity: applying $\mathbf{A}^i$ to $\mathbf{x}$ equals applying $\mathbf{T}^i$ in the Krylov basis. Linearly combining over a degree-$(k-1)$ polynomial gives $p(\mathbf{A})\mathbf{x} = \mathbf{Q}p(\mathbf{T})\mathbf{Q}^\top\mathbf{x}$, enabling a reduction to $k$-dimensional computation."
      - label: "Exact arithmetic error bound"
        content: |
          $\|f(\mathbf{A})\mathbf{x} - \mathbf{Q}f(\mathbf{T})\mathbf{Q}^\top\mathbf{x}\|_2 \leq 2\delta_k \|\mathbf{x}\|_2$
        description: "Under exact arithmetic the $O(k)$ factor in Theorem 1 improves to 2, proved via triangle inequality, orthonormality of $\mathbf{Q}$, and the Cauchy interlacing theorem."

  - type: theorem
    number: "2"
    name: "Jackson's theorem"
    statement: |
      Suppose $f : S \to \mathbb{R}$ is $k$-times differentiable and $|f^{(k)}| \leq L$ everywhere in $S$. There are absolute constants $c, C$ such that if $k \leq cd$, there is a degree-$d$ polynomial $p$ satisfying
      \[
        \sup_{x \in S} |f(x) - p(x)| \leq L \cdot \left(\frac{C}{d}\right)^k.
      \]
    context: "Guarantees existence of good polynomial approximations for smooth functions. In particular, $L$-Lipschitz functions ($k=1$) admit degree-$d$ approximations with error $O(L/d)$. Combined with the dual characterization of EMD (Fact 1), implies distributions agreeing on their first $O(1/\epsilon)$ moments have $\mathrm{EMD} \leq \epsilon$."

  - type: theorem
    number: "3"
    name: "Trefethen's theorem (coefficient decay)"
    statement: |
      Let $f$ be analytically continuable to the interior of the Bernstein ellipse
      \[
        E_\rho := \left\{ \tfrac{1}{2}(z + z^{-1}) \;\middle|\; |z| = \rho \right\},
      \]
      and suppose $|f(x)| \leq M$ for $x \in E_\rho$. Then the Chebyshev coefficients $a_i$ of $f$ satisfy
      \[
        |a_i| \leq 2M\rho^{-i} \quad \text{for } i \geq 1.
      \]
    context: "Core tool for bounding Chebyshev truncation error: if $f$ is analytic on a large Bernstein ellipse, coefficients decay exponentially and a degree-$k$ truncation gives error $O(M \rho^{-k})$. Applied to $f(x)=x^{-1}$ on $[1,\kappa]$ to show degree-$\approx\sqrt{\kappa}$ polynomials approximate the inverse, matching conjugate gradient convergence rates."
    proof_notes:
      - label: "Contour expansion"
        content: |
          $a_k = \frac{1}{\pi\iota}\int_{|z|=1} z^{-(i+1)} F(z)\,\mathrm{d}z = \frac{1}{\pi\iota}\int_{|z|=\rho} z^{-(i+1)} F(z)\,\mathrm{d}z$,
          where $F(z) := f\!\left(\tfrac{1}{2}(z+z^{-1})\right)$.
        description: "By Cauchy's integral theorem, the contour can be expanded from $|z|=1$ to $|z|=\rho$ (since $f$ is analytic on the interior of $E_\rho$), yielding the bound $|a_k| \leq 2M\rho^{-i}$."

  - type: lemma
    number: "1"
    name: "Monomial approximation by low-degree polynomials"
    statement: |
      Let $k, m \in \mathbb{N}$. There is a degree-$k$ polynomial $p$ satisfying
      \[
        \sup_{x \in [-1,1]} |p(x) - x^m| \leq 2\exp\!\left(-\frac{k^2}{2m}\right).
      \]
    context: "Cornerstone of the 'truncated Taylor + monomial reduction' meta-strategy. Taking $k \gtrsim \sqrt{m}$ gives a highly accurate approximation of $x^m$ by a degree-$\sqrt{m}$ polynomial, enabling a quadratic improvement in degree when applied termwise to a Taylor expansion."
    proof_notes:
      - label: "Probabilistic construction"
        content: |
          Let $\{Y_i\}_{i \in \mathbb{N}}$ be i.i.d. Rademacher, $D_m := \sum_{i \in [m]} Y_i$. Then $\mathbb{E}[T_{D_m}(x)] = x^m$ (where $T_k(x) := T_{|k|}(x)$ for $k < 0$), and
          \[
            p(x) := \mathbb{E}\!\left[T_{D_m}(x) \cdot \mathbb{1}_{|D_m| \leq k}\right]
          \]
          is a degree-$k$ polynomial with $|p(x) - x^m| \leq \Pr[|D_m| > k] \leq 2\exp\!\left(-\frac{k^2}{2m}\right)$.
        description: "The truncated random-walk construction of the approximating polynomial $p$; the approximation bound follows from boundedness of Chebyshev polynomials on $[-1,1]$ and Hoeffding's inequality."

  - type: lemma
    number: "2"
    name: "Polynomial approximation of $\\exp(-Cx)$ on $[0,1]$"
    statement: |
      Let $C > 0$ and $\delta \in (0,1)$. There is a degree-$k$ polynomial $p$ satisfying
      \[
        \sup_{x \in [0,1]} |\exp(-Cx) - p(x)| \leq \delta, \quad k = O\!\left(\sqrt{C \log\tfrac{1}{\delta}} + \log\tfrac{1}{\delta}\right).
      \]
    context: "Used for approximating the matrix exponential $\exp(-C\mathbf{A})$, a central subroutine in the matrix multiplicative weights algorithm (next lecture). The degree is $O(\sqrt{C})$ rather than $O(C)$ from naive truncation, achieved by combining Taylor truncation with Lemma 1."
    proof_notes:
      - label: "Taylor truncation error $T_2$"
        content: |
          Choosing $t \gtrsim \max(\lambda, \log\tfrac{1}{\delta})$ (where $\lambda = C/2$) ensures
          \[
            T_2 := \exp(-\lambda)\sum_{i > t} \frac{\lambda^i}{i!} \leq \frac{\delta}{2}.
          \]
        description: "Controls the tail of the Taylor series; the factorial denominator dominates once $t \gg \lambda \asymp C$."
      - label: "Monomial approximation error $T_1$"
        content: |
          Choosing $k \gtrsim \sqrt{t \log\tfrac{1}{\delta}}$ ensures
          \[
            T_1 := \exp(-\lambda)\sum_{i=0}^{t} \frac{\lambda^i}{i!} \cdot 2\exp\!\left(-\frac{k^2}{2i}\right) \leq \frac{\delta}{2}.
          \]
        description: "Controls the error from applying Lemma 1 to each monomial in the truncated Taylor series; combining $t \asymp C$ and this choice gives the overall degree $k = O(\sqrt{C \log 1/\delta})$."

  - type: lemma
    number: "3"
    name: "Chebyshev truncation approximation error"
    statement: |
      Let $f(x)$ have Chebyshev decomposition $f(x) = \sum_{i=0}^{\infty} a_i T_i(x)$ over $[-1,1]$, and let $p(x) := \sum_{i=0}^{k} a_i T_i(x)$ be its degree-$k$ truncation. Then
      \[
        \sup_{x \in [-1,1]} |f(x) - p(x)| \leq \sum_{i > k} |a_i|.
      \]
    context: "Combined with Theorem 3, gives a complete strategy: identify an analytic continuation of $f$ to a Bernstein ellipse $E_\rho$, bound $|a_i| \leq 2M\rho^{-i}$, and conclude degree-$k$ truncation has error $O(M\rho^{-k})$."

  - type: remark
    number: "1"
    name: ""
    statement: |
      The range $[0,1]$ in Lemma 2 is not restrictive in applications: shifting $x \leftarrow 1+x$ and $C \leftarrow C/2$ moves $[-1,1]$ to $[0,1]$. More importantly, the optimal polynomial approximation to $\exp(-Cx)$ on $[-1,0]$ has degree $\Omega(C)$ [AA22], so the $\sqrt{C}$ savings from Lemma 1 are specific to $[0,1]$ (or equivalently $[0, \text{something positive}]$).
    context: "Clarifies the domain restriction in Lemma 2 and warns that the $\sqrt{C}$ improvement does not extend to all intervals."

  - type: remark
    number: "2"
    name: ""
    statement: |
      One cannot iterate Lemma 1 (to obtain, say, degree $\approx \sqrt[4]{C}$ approximations to $\exp(-Cx)$) because Chebyshev polynomials have rapidly growing leading coefficients: $T_k$ has leading coefficient $2^{k-1}$. Approximating $2^k x^k$ to additive error $\delta$ is equivalent to approximating $x^k$ to error $\delta \cdot 2^{-k}$, washing out any savings from a second application of Lemma 1.
    context: "Explains the fundamental obstruction to iterating the monomial-reduction strategy beyond one level."

  - type: proposition
    number: "—"
    name: "Extremal properties of Chebyshev polynomials"
    statement: |
      1. (Best monomial approximation) Scaled Chebyshev polynomials solve the minimax approximation of $x^{k+1}$ by degree-$k$ polynomials on $[-1,1]$: $T_{k+1}$ (appropriately scaled) is the best degree-$k$ approximation to $x^{k+1}$.

      2. (Maximal growth outside $[-1,1]$) If $p$ is a degree-$k$ polynomial with $p([-1,1]) \subseteq [-1,1]$, then for any $y$ with $|y| \geq 1$, $|p(y)| \leq |T_k(y)|$. Hence $T_k$ grows at least as fast outside $[-1,1]$ as any degree-$k$ polynomial bounded by 1 inside $[-1,1]$.

      3. (Largest derivative at 0) For odd $k$, among all degree-$k$ polynomials $p$ with $p([-1,1]) \subseteq [-1,1]$, $T_k(x)$ has the largest derivative at $0$.
    context: "Foundational extremal properties that explain why Chebyshev polynomials are optimal in various polynomial approximation and optimization settings."

  - type: remark
    number: "—"
    name: "Fact 1: Dual characterization of earth mover's distance"
    statement: |
      For any distributions $P, Q$ supported on a set $S$ with distance function $d(x,y) = \|x-y\|$ for some norm $\|\cdot\|$,
      \[
        \mathrm{EMD}(P,Q) = \sup_{g \in \mathcal{G}} \int g(x)(P(x)-Q(x))\,\mathrm{d}x, \quad \mathcal{G} := \{g : S \to \mathbb{R} \mid g \text{ is 1-Lipschitz in } \|\cdot\|\}.
      \]
    context: "Dual (Kantorovich–Rubinstein) formulation of EMD. Combined with Jackson's theorem, implies: if $P$ and $Q$ agree on their first $O(1/\epsilon)$ moments, then $\mathrm{EMD}(P,Q) \leq \epsilon$."

  - type: remark
    number: "—"
    name: "Application: inverse function approximation on $[1,\\kappa]$"
    statement: |
      For $f(x) = x^{-1}$ on $S = [1,\kappa]$, after shifting to $[-1,1]$ the pole of $g(y) = f(x(y))$ is at $y^\star = -1 - \Theta(1/\kappa)$. The largest Bernstein ellipse $E_\rho$ that avoids $y^\star$ satisfies $\rho = 1 + \Theta(\kappa^{-1/2})$. Theorem 3 then gives $|a_i| = O(\exp(-i\kappa^{-1/2}))$, so a degree-$\approx\sqrt{\kappa}$ polynomial sharply approximates $x^{-1}$ on $[1,\kappa]$. The same calculation applies to any function on $[1,\kappa]$ with a pole at $0$, e.g., $f(x) = \sqrt{x}$.
    context: "Explains why conjugate gradient converges in $O(\sqrt{\kappa})$ iterations and is the canonical example of Trefethen's theorem in algorithmic applications."
