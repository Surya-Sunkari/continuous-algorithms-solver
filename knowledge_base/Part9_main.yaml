    context: "Shows that the expected sum of partial leverage score overestimates $\tau_i^{S \cup \{i\}}(\mathbf{A})$ is $O(nd/k)$ for a random subset $S$ of size $k$. Used in the recursive leverage score sampling algorithm (Theorem 2) to bound the total weight of the overestimates at each recursion level."

