source: "Part17_main.pdf"
lecture_number: 17
title: "Langevin algorithms"
items:
  - type: definition
    number: "(1)"
    name: "Langevin dynamics SDE"
    statement: |
      The Langevin dynamics is the SDE
      \[
      d\mathbf{x}_t = -\nabla V(\mathbf{x}_t) dt + \sqrt{2} d\mathbf{B}_t.
      \]
      Its stationary distribution is $\pi^\star \propto \exp(-V)$.
    context: "Continuous-time dynamics whose stationary distribution is the log-concave target; basis for all Langevin-based samplers."

  - type: definition
    number: "(2)"
    name: "Unadjusted Langevin algorithm (ULA)"
    statement: |
      The unadjusted Langevin algorithm (ULA) samples $\mathbf{x}_0$ from a starting distribution $\pi_0$, and for a step size $\eta > 0$, iterates
      \[
      \mathbf{x}^{(k+1)} \leftarrow \mathbf{x}^{(k)} - \eta \nabla V(\mathbf{x}^{(k)}) + \sqrt{2\eta} \boldsymbol{\xi}^{(k)}, \quad \text{where } \boldsymbol{\xi}_k \sim \mathcal{N}(\mathbf{0}_d, \mathbf{I}_d).
      \]
      ULA is a forward Euler discretization of the Langevin dynamics.
    context: "Discrete-time, implementable algorithm for approximately sampling from $\\pi^\\star \\propto \\exp(-V)$. Requires only one query to $\\nabla V$ per iteration."

  - type: definition
    number: "(3)"
    name: "Euler-discretized SDE equivalent to ULA"
    statement: |
      The ULA iteration (2) is equivalently induced by the SDE
      \[
      d\mathbf{x}_t = -\nabla V(\mathbf{x}_0) dt + \sqrt{2} d\mathbf{B}_t
      \]
      up to time $t = \eta$, initialized at $\mathbf{x}_0 \leftarrow \mathbf{x}^{(k)}$. The position-dependent drift $\nabla V(\mathbf{x}_t)$ used in the Langevin dynamics is replaced by the constant drift $\nabla V(\mathbf{x}_0)$.
    context: "Provides a continuous-time SDE formulation of one ULA step, used for analyzing discretization error."

  - type: lemma
    number: "1"
    name: ""
    statement: |
      Let $\pi^\star \propto \exp(-V)$, where $V : \mathbb{R}^d \to \mathbb{R}$ is $L$-smooth. Then,
      \[
      \mathbb{E}_{\mathbf{x} \sim \pi^\star}\left[\|\nabla V(\mathbf{x})\|_2^2\right] \leq Ld.
      \]
    context: "Bounds the expected squared gradient norm under the stationary distribution. Useful for transferring gradient norm bounds via Wasserstein coupling."
    proof_notes:
      - label: "Integration by parts identity"
        content: |
          \mathbb{E}_{\mathbf{x} \sim \pi^\star}\left[\|\nabla V(\mathbf{x})\|_2^2\right] = \int \mathrm{Tr}\left(\nabla^2 V(\mathbf{x})\right) \exp(-V(\mathbf{x})) d\mathbf{x} \leq Ld.
        description: "The key integration-by-parts step that reduces the gradient-norm expectation to a trace-of-Hessian expectation, bounded by $Ld$ via $L$-smoothness."

  - type: lemma
    number: "2"
    name: ""
    statement: |
      Let $\{\mathbf{x}_t\}_{t \in [0, \eta]}$ follow the Langevin dynamics (1), where $V : \mathbb{R}^d \to \mathbb{R}$ is $L$-smooth and $\eta \leq \frac{1}{3L}$. Then,
      \[
      \mathbb{E}\left[\|\mathbf{x}_\eta - \mathbf{x}_0\|_2^2\right] \leq 6\eta^2 \mathbb{E}\left[\|\nabla V(\mathbf{x}_0)\|_2^2\right] + 12\eta d.
      \]
    context: "Bounds the expected squared displacement of Langevin dynamics over a small time interval. Used to control ULA discretization error."
    proof_notes:
      - label: "(4)"
        content: |
          \mathbb{E}\left[\|\mathbf{x}_t - \mathbf{x}_0\|_2^2\right] \leq 3\eta^2 \mathbb{E}\left[\|\nabla V(\mathbf{x}_0)\|_2^2\right] + 3\eta L^2 \mathbb{E}\left[\int_0^t \|\mathbf{x}_s - \mathbf{x}_0\|_2^2 ds\right] + 6\eta d.
        description: "Intermediate bound on the displacement, used as input to Gronwall's inequality."
      - label: "(5)"
        content: |
          \left\|\int_0^t \mathbf{v}_s ds\right\|_2^2 \leq \int_0^t \int_0^t \frac{1}{2}\left(\|\mathbf{v}_s\|_2^2 + \|\mathbf{v}_{s'}\|_2^2\right) ds\, ds' = t \int_0^t \|\mathbf{v}_s\|_2^2 ds.
        description: "Cauchy-Schwarz inequality used to bound a time-integral of vector-valued functions; a generally useful inequality for controlling Brownian motion integrals."

  - type: lemma
    number: "3"
    name: ""
    statement: |
      Let $V : \mathbb{R}^d \to \mathbb{R}$ be $L$-smooth and $\mu$-strongly convex. Let $\mathbf{x}_0 \sim \pi_0$, let $\{\mathbf{x}_t\}_{t \in [0, \eta]}$ follow (3), and let $\pi_\eta$ denote the law of $\mathbf{x}_\eta$. Then, for $\eta \leq \frac{\mu}{10L^2}$,
      \[
      W_2^2(\pi_\eta, \pi^\star) \leq \left(1 - \frac{\mu\eta}{2}\right) W_2^2(\pi_0, \pi^\star) + \frac{32\eta^2 L^2 d}{\mu}.
      \]
    context: "One-step $W_2^2$ contraction plus bias bound for ULA under strong convexity. Iterating this yields Theorem 1."
    proof_notes:
      - label: "(6)"
        content: |
          W_2^2(\bar{\pi}_\eta, \pi^\star) \leq \exp(-2\mu\eta) W_2^2(\pi_0, \pi^\star).
        description: "Contraction of $W_2^2$ along the exact Langevin dynamics (from Theorem 2, Part XVI); used as the no-discretization baseline."
      - label: "(7)"
        content: |
          \mathbb{E}\left[\|\nabla V(\mathbf{x}_0)\|_2^2\right] \leq 2Ld + 2L^2 W_2^2(\pi_0, \pi^\star).
        description: "Transfers a bound on the gradient norm from $\\pi^\\star$ (Lemma 1) to an arbitrary distribution $\\pi_0$ via Wasserstein coupling and smoothness; a very reusable bound."
      - label: "(8)"
        content: |
          W_2^2(\pi_\eta, \bar{\pi}_\eta) \leq 16\eta^3 L^2 d + 12\eta^4 L^4 W_2^2(\pi_0, \pi^\star).
        description: "One-step $W_2^2$ discretization error between ULA output $\\pi_\\eta$ and exact Langevin output $\\bar{\\pi}_\\eta$, when step size satisfies $\\eta L \\leq 1/10$."

  - type: theorem
    number: "1"
    name: "$W_2^2$ convergence of unadjusted Langevin"
    statement: |
      Let $V : \mathbb{R}^d \to \mathbb{R}$ be $L$-smooth and $\mu$-strongly convex, and let $\pi^\star \propto \exp(-V)$, $\kappa := \frac{L}{\mu}$, $\epsilon \in (0, 1)$. Let $\mathbf{x}^{(0)} \leftarrow \operatorname{argmin}_{\mathbf{x} \in \mathbb{R}^d} V(\mathbf{x})$, and consider iterating (2) for $0 \leq k < K$ with $\eta = \frac{\epsilon^2 \mu}{128 L^2 d}$. Then, if $\pi^{(K)}$ denotes the law of $\mathbf{x}^{(K)}$,
      \[
      \mu W_2^2\left(\pi^{(K)}, \pi^\star\right) \leq \epsilon^2, \quad \text{for } K \geq \frac{256 \kappa^2 d}{\epsilon^2} \log\left(\frac{4d}{\epsilon^2}\right).
      \]
    context: "Main $W_2^2$ convergence guarantee for ULA under strong log-concavity. Gives a gradient query complexity of $\\widetilde{O}(\\kappa^2 d / \\epsilon^2)$."
    proof_notes:
      - label: "Recursion over Lemma 3"
        content: |
          W_2^2\left(\pi^{(K)}, \pi^\star\right) \leq \exp\left(-\frac{\mu\eta K}{2}\right) W_2^2\left(\pi^{(0)}, \pi^\star\right) + \frac{32\eta^2 L^2 d}{\mu} \cdot \frac{2}{\mu\eta}.
        description: "Recursing Lemma 3 over $K$ iterations and summing the geometric series. Reduces the convergence analysis to a direct calculation under the choices of $\\eta, K$."

  - type: remark
    number: "(9)"
    name: "Otto-Villani theorem relating $W_2^2$ and $D_{KL}$"
    statement: |
      If $\pi^\star$ satisfies a log-Sobolev inequality with constant $\frac{1}{\mu}$, then
      \[
      \frac{\mu}{2} W_2^2(\pi, \pi^\star) \leq D_{KL}(\pi \| \pi^\star).
      \]
    context: "Transfers $D_{KL}$ convergence to $W_2^2$ convergence under a log-Sobolev assumption on $\\pi^\\star$. Used to compare Theorems 1 and 2."

  - type: lemma
    number: "4"
    name: ""
    statement: |
      Let $V : \mathbb{R}^d \to \mathbb{R}$ be $L$-smooth and suppose $\pi^\star \propto \exp(-V)$ satisfies a log-Sobolev inequality with constant $\frac{1}{\mu}$. Let $\mathbf{x}_0 \sim \pi_0$, let $\{\mathbf{x}_t\}_{t \in [0, \eta]}$ follow (3), and let $\pi_\eta$ denote the law of $\mathbf{x}_\eta$. Then for $\eta \leq \frac{\mu}{16L^2}$,
      \[
      D_{KL}(\pi_\eta \| \pi^\star) \leq \left(1 - \frac{\mu\eta}{2}\right) D_{KL}(\pi_0 \| \pi^\star) + 9\eta^2 L^2 d.
      \]
    context: "Discrete-time analog of the $D_{KL}$ contraction result for Langevin dynamics (Vempala-Wibisono). Gives a one-step KL-divergence bound for ULA."
    proof_notes:
      - label: "(10)"
        content: |
          \pi_{0t}(\mathbf{x}_0, \mathbf{x}_t) = \pi_0(\mathbf{x}_0) \pi_{t|0}(\mathbf{x}_t | \mathbf{x}_0) = \pi_t(\mathbf{x}_t) \pi_{0|t}(\mathbf{x}_0 | \mathbf{x}_t).
        description: "Joint-marginal decomposition of the joint law of $(\\mathbf{x}_0, \\mathbf{x}_t)$ for ULA dynamics."
      - label: "(11)"
        content: |
          \frac{\partial}{\partial t} \pi_t(\mathbf{x}) = \nabla \cdot \left(\pi_t(\mathbf{x}) \nabla \log\left(\frac{\pi_t(\mathbf{x})}{\pi^\star(\mathbf{x})}\right)\right) + \nabla \cdot \left(\pi_t(\mathbf{x}) \mathbb{E}_{\mathbf{x}_0 \sim \pi_{0|t}}[\nabla V(\mathbf{x}_0) - \nabla V(\mathbf{x}) \mid \mathbf{x}_t = \mathbf{x}]\right).
        description: "Continuity equation for the ULA SDE (3). Compared to the continuity equation for continuous Langevin, this differs only by the conditional expectation term $\\mathbb{E}_{\\mathbf{x}_0 \\sim \\pi_{0|t}}[\\nabla V(\\mathbf{x}_0) - \\nabla V(\\mathbf{x}) \\mid \\mathbf{x}_t = \\mathbf{x}]$ capturing discretization bias."
      - label: "(12)"
        content: |
          \frac{\partial}{\partial t} D_{KL}(\pi_t \| \pi^\star) \leq -\frac{1}{2} \int \left\|\nabla \log\left(\frac{\pi_t(\mathbf{x})}{\pi^\star(\mathbf{x})}\right)\right\|_2^2 \pi_t(\mathbf{x}) d\mathbf{x} + \frac{1}{2} \mathbb{E}_{(\mathbf{x}_0, \mathbf{x}) \sim \pi_{0t}}\left[\|\nabla V(\mathbf{x}_0) - \nabla V(\mathbf{x})\|_2^2\right].
        description: "Rate of change of $D_{KL}(\\pi_t \\| \\pi^\\star)$ along ULA, decomposed into a negative Fisher-information-like term and a discretization-error term. The crucial inequality in the proof."

  - type: theorem
    number: "2"
    name: "$D_{KL}$ convergence of unadjusted Langevin"
    statement: |
      Let $V : \mathbb{R}^d \to \mathbb{R}$ be $L$-smooth and suppose $\pi^\star \propto \exp(-V)$ satisfies a log-Sobolev inequality with constant $\frac{1}{\mu}$, and let $\kappa := \frac{L}{\mu}$, $\epsilon \in (0, 1)$. Let $\mathbf{x}^{(0)} \sim \pi_0$, and consider iterating the update (2) for $0 \leq k < K$ with $\eta = \frac{\epsilon^2 \mu}{72 L^2 d}$. Then, if $\pi^{(K)}$ denotes the law of $\mathbf{x}^{(K)}$,
      \[
      D_{KL}\left(\pi^{(K)} \| \pi^\star\right) \leq \frac{\epsilon^2}{2} \quad \text{for } K \geq \frac{144 \kappa^2 d}{\epsilon^2} \log\left(\frac{4 D_{KL}(\pi^{(0)} \| \pi^\star)}{\epsilon^2}\right).
      \]
    context: "$D_{KL}$ convergence for ULA under a log-Sobolev assumption (weaker than strong log-concavity). Scaling $\\epsilon^2/2$ ensures $D_{TV}(\\pi^{(K)}, \\pi^\\star) \\leq \\epsilon$ by Pinsker's inequality."

  - type: definition
    number: "(13)"
    name: "MALA proposal distribution"
    statement: |
      The proposal distribution for the Metropolis-adjusted Langevin algorithm (MALA) from $\mathbf{x} \in \mathbb{R}^d$ is
      \[
      \mathcal{P}_\mathbf{x} = \mathcal{N}(\mathbf{x} - \eta\nabla V(\mathbf{x}), 2\eta \mathbf{I}_d).
      \]
      This is exactly the distribution of $\mathbf{x}^{(k+1)}$ induced by one step of ULA, starting from $\mathbf{x}^{(k)} \leftarrow \mathbf{x}$.
    context: "Defines the forward proposal of MALA as a ULA step."

  - type: definition
    number: "(14)"
    name: "MALA transition density"
    statement: |
      The MALA transition density applies a Metropolis-Hastings correction to (13):
      \[
      \mathcal{T}_\mathbf{x}(\mathbf{y}) = \mathcal{P}_\mathbf{x}(\mathbf{y}) \min\left(1, \frac{\pi^\star(\mathbf{y}) \mathcal{P}_\mathbf{y}(\mathbf{x})}{\pi^\star(\mathbf{x}) \mathcal{P}_\mathbf{x}(\mathbf{y})}\right), \quad \text{for all } \mathbf{y} \in \mathbb{R}^d, \mathbf{y} \neq \mathbf{x}.
      \]
      MALA has stationary distribution $\pi^\star \propto \exp(-V)$ exactly.
    context: "Defines MALA as a Markov chain; the Metropolis-Hastings filter corrects the ULA proposal bias."

  - type: lemma
    number: "5"
    name: ""
    statement: |
      Let $V : \mathbb{R}^d \to \mathbb{R}$ be $L$-smooth and $\mu$-strongly convex, and let $\kappa := \frac{L}{\mu}$, $\epsilon \in (0, 1)$. For $\mathbf{x}^\star := \operatorname{argmin}_{\mathbf{x} \in \mathbb{R}^d} V(\mathbf{x})$, the initialization $\pi_0 := \mathcal{N}(\mathbf{x}^\star, \frac{1}{L} \mathbf{I}_d)$ is $\beta$-warm with respect to $\pi^\star$, for $\beta = \kappa^{d/2}$.
    context: "Warm start for MALA: a Gaussian centered at the minimizer of $V$ with covariance $\\frac{1}{L} \\mathbf{I}_d$ has warmness $\\kappa^{d/2}$. Although exponential in $d$, only $\\log \\beta$ appears in MALA's mixing time."
    proof_notes:
      - label: "Warmness bound via strong convexity"
        content: |
          \frac{\pi_0(\mathbf{x})}{\pi^\star(\mathbf{x})} \leq \frac{\int \exp(-\frac{\mu}{2}\|\mathbf{y} - \mathbf{x}^\star\|_2^2) d\mathbf{y}}{(2\pi L^{-1})^{d/2}} = \frac{(2\pi\mu^{-1})^{d/2}}{(2\pi L^{-1})^{d/2}} = \kappa^{d/2}.
        description: "Uses the $\\mu$-strong convexity lower bound $f(\\mathbf{x}) \\geq f(\\mathbf{x}^\\star) + \\frac{\\mu}{2}\\|\\mathbf{x} - \\mathbf{x}^\\star\\|_2^2$ and the $L$-smoothness upper bound to compute the warmness ratio directly."

  - type: lemma
    number: "6"
    name: ""
    statement: |
      Let $\pi^\star$ be a $\mu$-strongly logconcave density on $\mathbb{R}^d$, and let $S_1, S_2, S_3$ partition $\mathbb{R}^d$. Then,
      \[
      \frac{\pi^\star(S_3)}{\left(\min_{\mathbf{x} \in S_1, \mathbf{y} \in S_2} \|\mathbf{x} - \mathbf{y}\|_2\right)} \geq \frac{\pi^\star(S_1) \pi^\star(S_2)}{2} \sqrt{\mu \log\left(1 + \frac{1}{\min(\pi^\star(S_1), \pi^\star(S_2))}\right)}.
      \]
    context: "Isoperimetric inequality for strongly log-concave densities. Shows the isoperimetric constant is $\\Omega(\\sqrt{\\mu})$ and improves further at smaller scales, sharpening MALA mixing bounds."
    proof_notes:
      - label: "(15)"
        content: |
          \frac{\pi^\star(S_3)}{\left(\min_{\mathbf{x} \in S_1, \mathbf{y} \in S_2} \|\mathbf{x} - \mathbf{y}\|_2\right)} \geq \frac{\pi^\star(S_1) \pi^\star(S_2)}{2} \sqrt{\mu \log\left(1 + \frac{1}{\min(\pi^\star(S_1), \pi^\star(S_2))}\right)}.
        description: "The isoperimetric inequality itself. Established via the localization lemma (Proposition 4, Part XV) and reduction to one-dimensional log-linear densities convolved with $\\mathcal{N}(0, 1/\\mu)$."

  - type: lemma
    number: "7"
    name: ""
    statement: |
      Let $\pi^\star \propto \exp(-V)$ be a $\mu$-strongly logconcave density on $\mathbb{R}^d$, and let $\mathbf{x}^\star := \operatorname{argmin}_{\mathbf{x} \in \mathbb{R}^d} V(\mathbf{x})$. For all $\delta \in (0, 1)$, we have
      \[
      \Pr_{\mathbf{x} \sim \pi^\star}\left[\|\mathbf{x} - \mathbf{x}^\star\| > \sqrt{\frac{2d}{\mu}} + \sqrt{\frac{2\log(\frac{1}{\delta})}{\mu}}\right] \leq \delta.
      \]
    context: "Tail bound for strongly log-concave densities. Used to choose a large-stationary-measure set $\\Omega$ for MALA conductance analysis."
    proof_notes:
      - label: "Mean + Lipschitz concentration"
        content: |
          \mathbb{E}\|\mathbf{x} - \mathbf{x}^\star\|_2 \leq (2d/\mu)^{1/2}.
        description: "Expected distance from $\\pi^\\star$'s mode is bounded by $\\sqrt{2d/\\mu}$, by Lemma 5 Part XVI and Jensen's inequality. Combined with log-Sobolev (Lemma 11 Part XVI) applied to the 1-Lipschitz function $\\|\\mathbf{x} - \\mathbf{x}^\\star\\|_2$, yields the tail bound."

  - type: lemma
    number: "8"
    name: ""
    statement: |
      In the setting of Lemma 7, let $V$ be $L$-smooth, let $R > 0$, and let $\Omega := \mathbb{B}(\mathbf{x}^\star, R)$. Assume that $LR^2 \geq d$. Then if $\eta \leq \frac{1}{500 L^2 R^2 d}$ in (13), for all $\mathbf{x}, \mathbf{x}' \in \Omega$, we have
      \[
      D_{TV}(\mathcal{T}_\mathbf{x}, \mathcal{T}_{\mathbf{x}'}) \leq \frac{1}{2} \quad \text{if } \|\mathbf{x} - \mathbf{x}'\|_2 \leq \frac{\sqrt{\eta}}{5}.
      \]
    context: "Regularity bound for MALA transitions: nearby points have significantly overlapping transition distributions. Combined with isoperimetry (Lemma 6), yields conductance bounds."
    proof_notes:
      - label: "(16)"
        content: |
          D_{TV}(\mathcal{P}_\mathbf{x}, \mathcal{P}_{\mathbf{x}'}) \leq \frac{1}{6}.
        description: "TV distance between the proposal distributions at nearby points $\\mathbf{x}, \\mathbf{x}'$ is bounded by $\\frac{1}{6}$."
      - label: "(17)"
        content: |
          D_{TV}(\mathcal{P}_\mathbf{x}, \mathcal{T}_\mathbf{x}) \leq \frac{1}{6}.
        description: "The Metropolis-Hastings filter rejects with probability at most $\\frac{1}{6}$ for $\\mathbf{x} \\in \\Omega$; this bounds the effect of the filter on the proposal distribution."
      - label: "(18)"
        content: |
          D_{TV}(\mathcal{P}_\mathbf{x}, \mathcal{P}_{\mathbf{x}'}) \leq \sqrt{\frac{1}{2} D_{KL}(\mathcal{P}_\mathbf{x} \| \mathcal{P}_{\mathbf{x}'})} = \frac{\|(\mathbf{x} - \eta\nabla V(\mathbf{x})) - (\mathbf{x}' - \eta\nabla V(\mathbf{x}'))\|_2}{\sqrt{8\eta}} \leq \frac{(1 + \eta L)\|\mathbf{x} - \mathbf{x}'\|_2}{\sqrt{8\eta}} \leq \frac{\|\mathbf{x} - \mathbf{x}'\|_2}{\sqrt{2\eta}} \leq \frac{1}{6}.
        description: "Chain of inequalities: Pinsker, exact KL between multivariate Gaussians, smoothness of $V$, and the hypothesis on $\\|\\mathbf{x} - \\mathbf{x}'\\|_2$. Establishes (16)."
      - label: "(19)"
        content: |
          \|\boldsymbol{\xi}\|_2 \leq \sqrt{2d} \quad \text{with probability} \geq \frac{11}{12}.
        description: "Chi-squared tail bound on the standard Gaussian vector $\\boldsymbol{\\xi} \\sim \\mathcal{N}(\\mathbf{0}_d, \\mathbf{I}_d)$ for large enough $d$. Used in the coupling argument for (17)."
      - label: "(20)"
        content: |
          D_{TV}(\mathcal{P}_\mathbf{x}, \mathcal{T}_\mathbf{x}) = 1 - \mathbb{E}_{\boldsymbol{\xi} \sim \mathcal{N}(\mathbf{0}_d, \mathbf{I}_d)}\left[\min\left(1, \frac{\pi^\star(\mathbf{y}) \mathcal{P}_\mathbf{y}(\mathbf{x})}{\pi^\star(\mathbf{x}) \mathcal{P}_\mathbf{x}(\mathbf{y})}\right)\right], \quad \text{for } \mathbf{y} := \mathbf{x} - \eta\nabla V(\mathbf{x}) + \sqrt{2\eta}\boldsymbol{\xi}.
        description: "Exact formula for the TV distance between the proposal and Metropolis-filtered transition, expressed as an expectation of the rejection probability."
      - label: "(21)"
        content: |
          \frac{\pi^\star(\mathbf{y}) \mathcal{P}_\mathbf{y}(\mathbf{x})}{\pi^\star(\mathbf{x}) \mathcal{P}_\mathbf{x}(\mathbf{y})} \geq \frac{11}{12}.
        description: "Key lower bound on the Metropolis-Hastings ratio, whenever $\\boldsymbol{\\xi}$ satisfies (19). Combined with Markov yields (17)."
      - label: "(22)"
        content: |
          V(\mathbf{x}) - V(\mathbf{y}) \geq -\frac{1}{24}, \quad \|\mathbf{x} - \mathbf{y} + \eta\nabla V(\mathbf{x})\|_2^2 - \|\mathbf{x} - \mathbf{y} + \eta\nabla V(\mathbf{y})\|_2^2 \geq -\frac{\eta}{6}.
        description: "The two constituent bounds needed to prove (21). The first uses $L$-smoothness and the bound $\\|\\mathbf{x} - \\mathbf{y}\\|_2 \\leq \\eta L R + 3\\sqrt{\\eta d}$; the second uses a direct algebraic manipulation and smoothness."

  - type: theorem
    number: "3"
    name: "Convergence of Metropolis-adjusted Langevin"
    statement: |
      Let $V : \mathbb{R}^d \to \mathbb{R}$ be $L$-smooth and $\mu$-strongly convex, and let $\pi^\star \propto \exp(-V)$, $\kappa := \frac{L}{\mu}$, $\epsilon \in (0, 1)$. Let $\mathbf{x}^{(0)} \sim \mathcal{N}(\mathbf{x}^\star, \frac{1}{L}\mathbf{I}_d)$ where $\mathbf{x}^\star := \operatorname{argmin}_{\mathbf{x} \in \mathbb{R}^d} V(\mathbf{x})$, and consider iterating the Markov chain with transitions (14) for $K$ iterations. Then if $\pi^{(K)}$ denotes the law of $\mathbf{x}^{(K)}$,
      \[
      \chi^2\left(\pi^{(K)} \| \pi^\star\right) \leq \epsilon, \quad \text{if } \eta = \frac{1}{10^5 L \kappa d (d\log(\kappa) + \log(\frac{1}{\epsilon}))}, \quad K = \Omega\left(\kappa^2 d^2 \log^2\left(\frac{d\log(\kappa)}{\epsilon}\right)\right).
      \]
    context: "High-accuracy $\\chi^2$ convergence for MALA under strong log-concavity. Gradient query complexity depends polylogarithmically on $\\frac{1}{\\epsilon}$ (vs. polynomially for ULA)."
    proof_notes:
      - label: "Choice of $\\Omega$"
        content: |
          R := 10\sqrt{\frac{d\log(\kappa) + \log\left(\frac{1}{\epsilon}\right)}{\mu}}, \quad \Omega := \mathbb{B}(\mathbf{x}^\star, R).
        description: "Radius $R$ ensures $\\pi^\\star(\\Omega) \\geq 1 - \\frac{\\epsilon^2}{3\\beta^2}$ via Lemma 7 with $\\delta = \\frac{\\epsilon^2}{3\\beta^2}$ and $\\beta = \\kappa^{d/2}$."
      - label: "Conductance bound"
        content: |
          \Phi_\Omega(\tau) \geq \min\left(\frac{1}{8}, \frac{\sqrt{\eta\mu \log(1 + \frac{1}{\tau})}}{640}\right).
        description: "Obtained by plugging Lemmas 6 and 8 into Proposition 3, Part XV. The conductance bound drives the overall mixing time via Proposition 1, Part XV."

  - type: remark
    number: "1"
    name: "Sharpened MALA analyses"
    statement: |
      The analysis of MALA can be sharpened significantly. [DCWY19, CDWY20] proved that $\kappa d + \kappa^{1.5}\sqrt{d}$ iterations of MALA suffice for high-accuracy mixing. This was later improved to $\kappa d$ by [LST20], who proved a good conductance bound over a more complex set $\Omega$ where both iterate norms and gradient norms are small. [CLA+21] directly established a spectral gap of $\operatorname{poly}(\kappa)\sqrt{d}$ for MALA with an appropriate step size, giving mixing times scaling as $\sqrt{d}$ under a polynomially-warm start.
    context: "Summary of state-of-the-art MALA mixing time bounds beyond Theorem 3."

  - type: remark
    number: "Section 4 summary"
    name: "The frontier of log-concave sampling"
    statement: |
      Gradient query complexities for samplers are typically parameterized by $\kappa, d, \frac{1}{\epsilon}$. Error-metric hierarchy under $\mu$-strong convexity: $\{D_{TV}, \sqrt{\mu} W_2\} \lesssim \sqrt{D_{KL}} \lesssim \sqrt{D_\alpha}$. The state-of-the-art low-accuracy $W_2$ bound is $\kappa^{7/6} d^{1/6} / \epsilon^{1/3} + \kappa d^{1/3} / \epsilon^{2/3}$ via randomized midpoint method [SL19]. KL divergence admits $\sqrt{d} \cdot \operatorname{poly}(\kappa, \frac{1}{\epsilon})$ via underdamped Langevin [ZCL+23]. High-accuracy: [CLA+21] gave an approach yielding $\approx \sqrt{d} \cdot \operatorname{poly}(\kappa, \log(\frac{1}{\epsilon}))$ gradient query complexity.
    context: "Summary of known upper and lower bounds for log-concave sampling across TV, $W_2$, KL, and Renyi metrics."
