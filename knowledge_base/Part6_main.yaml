source: "Part6_main.pdf"
lecture_number: 6
title: "CS395T: Continuous Algorithms, Part VI — Matrix analysis and concentration"
items:
  - type: definition
    number: "1"
    name: "Sub-Gaussian"
    statement: |
      We say a real-valued random variable $Z$ is $\sigma^2$-sub-Gaussian if
      \[
        \mathbb{E}\exp\!\left(\lambda(Z - \mathbb{E}Z)\right) \leq \exp\!\left(\frac{\lambda^2\sigma^2}{2}\right) \quad \text{for all } \lambda \in \mathbb{R}.
      \]
    context: "Fundamental definition capturing Gaussian-like tail behavior. Used as the hypothesis for Hoeffding's inequality (Theorem 1) and as the building block for sub-gamma variables."

  - type: definition
    number: "2"
    name: "Sub-gamma"
    statement: |
      We say $Z$ is $(\sigma^2, c)$-sub-gamma if the MGF condition (1) holds for all $|\lambda| \leq \frac{1}{c}$:
      \[
        \mathbb{E}\exp\!\left(\lambda(Z - \mathbb{E}Z)\right) \leq \exp\!\left(\frac{\lambda^2\sigma^2}{2}\right) \quad \text{for all } |\lambda| \leq \frac{1}{c}.
      \]
    context: "A truncated MGF variant of sub-Gaussianity. Used when the full MGF condition fails (e.g., squares of sub-Gaussian variables). Hypothesis for Bernstein's inequality (Theorem 2)."

  - type: definition
    number: "3"
    name: "Operator monotone and operator convex functions"
    statement: |
      Let $f : \mathbb{S}_I^{d\times d} \to \mathbb{S}^{d\times d}$ be an operator function identified with a scalar function $f : I \to \mathbb{R}$, where $\mathbb{S}_I^{d\times d}$ is the subset of $\mathbb{S}^{d\times d}$ with eigenvalues contained in $I \subseteq \mathbb{R}$.
      1. We say $f$ is operator monotone if $f(\mathbf{M}) \preceq f(\mathbf{N})$ for any $\mathbf{M}, \mathbf{N} \in \mathbb{S}_I^{d\times d}$ with $\mathbf{M} \preceq \mathbf{N}$.
      2. We say $f$ is operator convex if $f((1-\lambda)\mathbf{M} + \lambda\mathbf{M}') \preceq (1-\lambda)f(\mathbf{M}) + \lambda f(\mathbf{M}')$ for any $\mathbf{M}, \mathbf{M}' \in \mathbb{S}_I^{d\times d}$ and $\lambda \in (0,1)$. If $-f$ is operator convex, we say $f$ is operator concave.
    context: "Definitions needed to state and apply the Löwner-Heinz theorem (Theorem 5) and to develop matrix calculus. Operator monotonicity and convexity are strictly stronger than their scalar counterparts."

  - type: remark
    number: "1"
    name: ""
    statement: |
      The proof technique in Theorem 1, also known as the MGF method, is intimately connected to convex conjugates. Letting $\psi(\lambda) := \log \mathbb{E}\exp(\lambda(Z - \mathbb{E}(Z)))$ be the log-MGF, the Markov argument shows that
      \[
        \Pr[Z - \mathbb{E}Z \geq t] \leq \exp\!\left(-\sup_{\lambda \in \mathbb{R}}\left(\lambda t - \psi(\lambda)\right)\right) = \exp(-\psi^*(t)),
      \]
      so it suffices to bound $\psi^*$, the Cramér transform of $Z$. Theorem 1 follows because $\psi^*(t) = \frac{t^2}{2\sigma^2}$ when $\psi(\lambda) = \frac{\lambda^2\sigma^2}{2}$.
    context: "Explains the Cramér transform / convex conjugate interpretation of concentration bounds; useful for connecting Part III (convex conjugates) to concentration arguments."

  - type: proposition
    number: "1"
    name: "Equivalent characterizations of sub-Gaussianity"
    statement: |
      The following properties are equivalent for constants $C_1, C_2, C_3$:
      1. Sub-Gaussianity: $Z$ is $\sigma^2$-sub-Gaussian.
      2. Moment bound: For all $p \geq 1$, $\mathbb{E}|Z|^p \leq (C_1 \sigma \sqrt{p})^p$.
      3. Tail bound: For all $t \geq 0$, $\Pr[|Z| \geq t] \leq 2\exp(-(t/C_2\sigma)^2)$.
      4. MGF of square bound: $\mathbb{E}[\exp(\frac{Z}{C_3\sigma})^2] \leq 2$.
    context: "Gives practical handles for verifying or using sub-Gaussianity; in particular, the moment bound and tail bound forms are often more convenient than the MGF definition."

  - type: lemma
    number: "1"
    name: ""
    statement: |
      Let $Z$ be a random variable supported in $[a, b]$. Then $Z$ is $(b-a)^2$-sub-Gaussian.
    context: "Primary tool for establishing sub-Gaussianity of bounded random variables. Combined with Fact 2 (sums of independent sub-Gaussians), it implies Rademacher sums are $O(n)$-sub-Gaussian."
    proof_notes:
      - label: "Jensen step"
        content: |
          For $X = \frac{1}{b-a}(Z - \mathbb{E}Z) \in [-1,1]$ with $\mathbb{E}X = 0$, by Jensen's inequality with $f(t) = \exp(\lambda t)$ convex,
          \[
            \mathbb{E}\exp(\lambda X) \leq \mathbb{E}[\mathbb{E}[\exp(\lambda Y) \mid X]] = \mathbb{E}[\exp(\lambda Y)],
          \]
          where $Y \mid X = t$ is a $\{\pm 1\}$-valued variable with $\mathbb{E}[Y \mid X = t] = t$.
        description: "Reduces the problem from a bounded variable to a Rademacher variable by a spreading/Jensen argument."
      - label: "Rademacher MGF"
        content: |
          $\mathbb{E}[\exp(\lambda\sigma)] = \frac{1}{2}\exp(\lambda) + \frac{1}{2}\exp(-\lambda) \leq \exp\!\left(\frac{\lambda^2}{2}\right)$,
          where $\sigma \in \{\pm 1\}$ is a Rademacher variable.
        description: "Shows Rademacher variables are 1-sub-Gaussian via Taylor expansion; this is the 1-sub-Gaussian base case used in the proof."

  - type: theorem
    number: "1"
    name: "Hoeffding's inequality"
    statement: |
      Let $Z$ be $\sigma^2$-sub-Gaussian. Then for all $t \geq 0$,
      \[
        \Pr[|Z - \mathbb{E}Z| \geq t] \leq 2\exp\!\left(-\frac{t^2}{2\sigma^2}\right).
      \]
    context: "The fundamental tail bound for sub-Gaussian random variables. Implies $O(n)$-sub-Gaussian Rademacher sums deviate by at most $O(\sqrt{n\log(1/\delta)})$ with probability $1-\delta$."
    proof_notes:
      - label: "(2)"
        content: |
          For any $\lambda \geq 0$,
          \[
            \Pr[Z - \mathbb{E}Z \geq t] = \Pr[\exp(\lambda(Z - \mathbb{E}Z)) \geq \exp(\lambda t)] \leq \exp\!\left(-\lambda t + \frac{\lambda^2\sigma^2}{2}\right).
          \]
        description: "The one-sided Markov + MGF bound; optimizing over $\lambda$ gives the Hoeffding bound for the upper tail; symmetry in $Z, -Z$ gives the lower tail."

  - type: lemma
    number: "2"
    name: ""
    statement: |
      If $Z$ is supported in $[-c, c]$ with $\mathbb{E}Z = 0$ and $\mathbb{E}Z^2 = \sigma^2$, then $Z$ is $(2\sigma^2, 2c)$-sub-gamma.
    context: "Provides a tighter MGF bound than Lemma 1 for centered, bounded variables: the variance $\sigma^2$ can be much smaller than $c^2$. Used to establish sub-gamma behavior of bounded centered variables."
    proof_notes:
      - label: "(3)"
        content: |
          For $|\lambda| \leq \frac{1}{2c}$, using $\mathbb{E}[Z^p] \leq \mathbb{E}[Z^2 c^{p-2}] = \sigma^2 c^{p-2}$ for $p \geq 2$ and $p! \geq (p/e)^p$:
          \[
            \mathbb{E}[\exp(\lambda Z)] = 1 + \mathbb{E}\!\left[\sum_{p=2}^{\infty}\frac{\lambda^p Z^p}{p!}\right] \leq 1 + \sum_{p=2}^{\infty}\frac{\lambda^p \sigma^2 c^{p-2}}{p!} \leq 1 + \sum_{p=2}^{\infty}\frac{\lambda^2\sigma^2}{2^{p-1}} \leq \exp(\lambda^2\sigma^2).
          \]
        description: "The Taylor expansion bound; establishes the MGF is controlled by the variance $\sigma^2$ rather than the range $c^2$. This equation is directly invoked in the proof of Lemma 3."

  - type: lemma
    number: "3"
    name: ""
    statement: |
      Let $Z$ be $\sigma^2$-sub-Gaussian. Then $(Z - \mathbb{E}Z)^2$ is $(80\sigma^4, 40\sigma^2)$-sub-gamma.
    context: "Allows concentration of squared sub-Gaussian variables (e.g., squared norms of Gaussian vectors). Used to prove the Johnson-Lindenstrauss Corollary 1."
    proof_notes:
      - label: "(4)"
        content: |
          Let $X := Z - \mathbb{E}Z$. By sub-Gaussianity and Theorem 1,
          \[
            \mathbb{E}|X|^p = \int_0^\infty \Pr[|X|^p \geq t]\,dt = \int_0^\infty (pt^{p-1})\Pr[|X| \geq t]\,dt \leq 2p\int_0^\infty t^{p-1}\exp\!\left(-\frac{t^2}{2\sigma^2}\right)dt = p\,2^{\frac{p}{2}}\sigma^p\,\Gamma\!\left(\frac{p}{2}\right) \leq (2\sigma\sqrt{p})^p.
          \]
        description: "Moment bound for sub-Gaussian variables derived via Theorem 1; independently useful for bounding moments of any sub-Gaussian, and directly invoked to establish sub-gamma for the square."

  - type: theorem
    number: "2"
    name: "Bernstein's inequality"
    statement: |
      Let $Z$ be $(\sigma^2, c)$-sub-gamma. Then for all $t \geq 0$,
      \[
        \Pr[|Z - \mathbb{E}Z| \geq t] \leq 2\exp\!\left(-\min\!\left(\frac{t^2}{2\sigma^2},\,\frac{t}{2c}\right)\right).
      \]
    context: "Tail bound for sub-gamma variables showing two phases: Gaussian-like behavior for $t \leq \sigma^2/c$ and exponential-like behavior for $t > \sigma^2/c$. Used for chi-squared concentration and for proving Matrix Bernstein (Theorem 11)."

  - type: corollary
    number: "1"
    name: "Johnson-Lindenstrauss"
    statement: |
      Let $\{\mathbf{g}_i\}_{i\in[k]} \subseteq \mathbb{R}^d$ be i.i.d. draws from $\mathcal{N}(\mathbf{0}_d, \frac{1}{k}\mathbf{I}_d)$, and let $\mathbf{v} \in \mathbb{R}^d$ be fixed. Then for $Z := \sum_{i\in[k]}\langle\mathbf{g}_i,\mathbf{v}\rangle^2 = \|\mathbf{G}\mathbf{v}\|_2^2$, where $\mathbf{G} \in \mathbb{R}^{k\times d}$ has rows $\{\mathbf{g}_i\}_{i\in[k]}$:
      \[
        \Pr\!\left[\left|Z - \|\mathbf{v}\|_2^2\right| \geq \epsilon\|\mathbf{v}\|_2^2\right] \leq 2\exp\!\left(-\frac{\epsilon^2 k}{160}\right), \quad \text{for all } \epsilon \in \left(0, \frac{1}{2}\right).
      \]
    context: "Shows a $k = \Theta(\log(1/\delta)\cdot\epsilon^{-2})$ dimensional random Gaussian projection preserves the norm of any fixed vector up to $1\pm\epsilon$ factor. Implies pairwise distance preservation for $n$ vectors with $k = \Theta(\log(n)\cdot\epsilon^{-2})$."

  - type: theorem
    number: "3"
    name: "Chernoff bound"
    statement: |
      Let $\{Z_i\}_{i\in[n]}$ be independent random variables supported in $[0, R]$, let $Z = \sum_{i\in[n]}Z_i$, and let $\mu := \mathbb{E}Z$. Then,
      \[
        \Pr[Z \geq (1+\epsilon)\mu] \leq \exp\!\left(-\frac{\epsilon^2\mu}{(2+\epsilon)R}\right) \quad \text{for all } \epsilon \geq 0,
      \]
      \[
        \Pr[Z \leq (1-\epsilon)\mu] \leq \exp\!\left(-\frac{\epsilon^2\mu}{2R}\right) \quad \text{for all } \epsilon \in (0, 1).
      \]
    context: "Tight concentration for sums of bounded nonneg random variables. Key application: Poisson binomials (Corollary 2). Generalized to the matrix setting as Theorem 12. Improves on Bernstein when $\epsilon \approx 1$."

  - type: corollary
    number: "2"
    name: ""
    statement: |
      Let $Z = \sum_{i\in[n]}Z_i$ be a Poisson binomial random variable, where each $Z_i \in \{0,1\}$ has $\mathbb{E}Z_i = p_i$ and all $\{Z_i\}_{i\in[n]}$ are independent. If $\mu := \mathbb{E}Z \geq \frac{2}{\epsilon^2}\log(\frac{2}{\delta})$ where $\delta, \epsilon \in (0, \frac{1}{2})$, then
      \[
        \Pr[Z \notin [(1-\epsilon)\mu, (1+\epsilon)\mu]] \leq \delta.
      \]
    context: "Tight concentration for counting random events when the expected count is large. Directly used in Lemma 4 (geometric median amplification)."

  - type: lemma
    number: "4"
    name: ""
    statement: |
      Let $\delta \in (0,1)$, $R \geq 0$, and let $\mathcal{A}$ be a randomized algorithm returning $\mathbf{x} \in \mathbb{R}^d$ with $\mathbb{E}\|\mathbf{x} - \mathbf{x}^*\|_2 \leq R$ for unknown $\mathbf{x}^* \in \mathbb{R}^d$. There is an algorithm $\mathcal{A}'$ which calls $k$ independent copies of $\mathcal{A}$, and produces $\tilde{\mathbf{x}} \in \mathbb{R}^d$ such that $\|\tilde{\mathbf{x}} - \mathbf{x}^*\|_2 \leq 9R$ with probability $\geq 1 - \delta$, for $k = O(\log\frac{1}{\delta})$.
    context: "Geometric median amplification: boosts expected-distance guarantees to high-probability guarantees at $O(\log(1/\delta))$ overhead in runs. Used to amplify stochastic optimization algorithms."

  - type: theorem
    number: "4"
    name: "Spectral theorem"
    statement: |
      Let $\mathbf{M} \in \mathbb{R}^{d\times d}$. Then $\mathbf{M} \in \mathbb{S}^{d\times d}$ iff there is a unitary $\mathbf{U} \in \mathbb{R}^{d\times d}$ and diagonal $\mathbf{\Lambda} = \mathbf{diag}(\boldsymbol{\lambda}) \in \mathbb{R}^{d\times d}$ such that $\mathbf{M} = \mathbf{U}\mathbf{\Lambda}\mathbf{U}^\top$. If $\mathbf{M} = \mathbf{U}\mathbf{\Lambda}\mathbf{U}^\top$ for unitary $\mathbf{U}$ and $\mathbf{\Lambda} = \mathbf{diag}(\boldsymbol{\lambda})$, then $\boldsymbol{\lambda}$ are the eigenvalues of $\mathbf{M}$ and the columns of $\mathbf{U}$ are the eigenvectors of $\mathbf{M}$.
    context: "Fundamental structural result for symmetric matrices; used throughout to diagonalize and apply scalar functions entrywise. The cyclic property of trace gives $\operatorname{Tr}(\mathbf{M}) = \operatorname{Tr}(\mathbf{\Lambda})$, i.e., trace equals sum of eigenvalues."
    proof_notes:
      - label: "(7)"
        content: |
          $\operatorname{Tr}(\mathbf{M}) = \operatorname{Tr}(\mathbf{U}\mathbf{\Lambda}\mathbf{U}^\top) = \operatorname{Tr}(\mathbf{\Lambda}\mathbf{U}^\top\mathbf{U}) = \operatorname{Tr}(\mathbf{\Lambda})$ for $\mathbf{M} = \mathbf{U}\mathbf{\Lambda}\mathbf{U}^\top \in \mathbb{S}^{d\times d}$.
        description: "Trace equals sum of eigenvalues; invoked repeatedly when bounding Tr of matrix functions in concentration arguments."
      - label: "(8)"
        content: |
          $\mathbf{M} \in \mathbb{S}_{\succeq\mathbf{0}}^{d\times d} \iff \mathbf{v}^\top\mathbf{M}\mathbf{v} \geq 0$ for all $\mathbf{v} \in \mathbb{R}^d$.
        description: "Characterization of positive semidefiniteness via quadratic forms; used to verify PSD-ness of block matrices and to define the Löwner order."

  - type: lemma
    number: "5"
    name: ""
    statement: |
      If $\mathbf{M}, \mathbf{N} \in \mathbb{S}_{\succeq\mathbf{0}}^{d\times d}$, then $\langle\mathbf{M}, \mathbf{N}\rangle \geq 0$.
    context: "Inner product of two PSD matrices is nonneg. Used to establish monotonicity of Löwner order under taking inner products: if $\mathbf{N} \in \mathbb{S}_{\succeq\mathbf{0}}^{d\times d}$ and $\mathbf{M} \preceq \mathbf{M}'$, then $\langle\mathbf{M},\mathbf{N}\rangle \leq \langle\mathbf{M}',\mathbf{N}\rangle$."
    proof_notes:
      - label: "(9)"
        content: |
          Writing $\mathbf{M} = \sum_{i\in[d]}\lambda_i\mathbf{u}_i\mathbf{u}_i^\top$ and $\mathbf{N} = \sum_{i\in[d]}\lambda_i'\mathbf{v}_i\mathbf{v}_i^\top$,
          \[
            \langle\mathbf{M},\mathbf{N}\rangle = \sum_{i\in[d]}\sum_{j\in[d]}\lambda_i\lambda_j'\operatorname{Tr}(\mathbf{u}_i\mathbf{u}_i^\top\mathbf{v}_j\mathbf{v}_j^\top) = \sum_{i\in[d]}\sum_{j\in[d]}\lambda_i\lambda_j'(\mathbf{u}_i^\top\mathbf{v}_j)^2 \geq 0.
          \]
        description: "Explicit formula for the Frobenius inner product of two PSD matrices in terms of their spectral decompositions; also used in the proof of Theorem 6 (von Neumann trace inequality)."

  - type: corollary
    number: "3"
    name: "Singular value decomposition"
    statement: |
      Let $\mathbf{A} \in \mathbb{R}^{m\times n}$. There exist unitary $\mathbf{U} \in \mathbb{R}^{m\times m}$, $\mathbf{V} \in \mathbb{R}^{n\times n}$ and $\mathbf{\Sigma} \in \mathbb{R}_{\geq 0}^{m\times n}$ where $\mathbf{\Sigma}_{ij} = 0$ for $i \neq j$, such that $\mathbf{A} = \mathbf{U}\mathbf{\Sigma}\mathbf{V}^\top$.
    context: "Existence of the SVD for any real matrix. The diagonal entries $\{\Sigma_{ii}\}$ are the singular values; for $\mathbf{A} \in \mathbb{S}_{\succeq\mathbf{0}}^{d\times d}$ they coincide with eigenvalues. Used to define Schatten-$p$ norms and operator norms."

  - type: lemma
    number: "6"
    name: ""
    statement: |
      Let $\mathbf{M} \in \mathbb{S}^{d\times d}$ have all its eigenvalues lying in $I \subset \mathbb{R}$, and suppose $f : I \to \mathbb{R}$ and $g : I \to \mathbb{R}$ have $f(x) \leq g(x)$ for all $x \in I$. Then $f(\mathbf{M}) \preceq g(\mathbf{M})$.
    context: "Lifts scalar function inequalities to matrix inequalities for commuting (diagonalizable) matrices. Used throughout Section 2 and Section 3 to apply scalar bounds to matrix functions entrywise."

  - type: proposition
    number: "2"
    name: "Min-max eigenvalue theorem (variational characterization)"
    statement: |
      Let $\mathbf{M} \in \mathbb{S}^{d\times d}$. For all $k \in [d]$,
      \[
        \lambda_k(\mathbf{M}) = \max_{\substack{\mathbf{U}\in\mathbb{R}^{d\times k}\\\mathbf{U}^\top\mathbf{U}=\mathbf{I}_k}}\min_{\substack{\mathbf{u}\in\operatorname{Span}(\mathbf{U})\\\|\mathbf{u}\|_2=1}}\mathbf{u}^\top\mathbf{M}\mathbf{u} = \min_{\substack{\mathbf{U}\in\mathbb{R}^{d\times(d-k+1)}\\\mathbf{U}^\top\mathbf{U}=\mathbf{I}_{d-k+1}}}\max_{\substack{\mathbf{u}\in\operatorname{Span}(\mathbf{U})\\\|\mathbf{u}\|_2=1}}\mathbf{u}^\top\mathbf{M}\mathbf{u}.
      \]
    context: "Variational characterization of eigenvalues. Used to derive Cauchy interlacing (Corollary 4), Weyl's inequality (Corollary 5), and Corollary 6 (trace monotonicity under Löwner order)."
    proof_notes:
      - label: "(10)"
        content: |
          $\lambda_k(\mathbf{M}) = \max_{\substack{\mathbf{U}\in\mathbb{R}^{d\times k}\\\mathbf{U}^\top\mathbf{U}=\mathbf{I}_k}}\min_{\substack{\mathbf{u}\in\operatorname{Span}(\mathbf{U})\\\|\mathbf{u}\|_2=1}}\mathbf{u}^\top\mathbf{M}\mathbf{u}$
        description: "The max-min form of the variational characterization; directly used in the proofs of Corollaries 4 and 5."

  - type: corollary
    number: "4"
    name: "Cauchy interlacing theorem"
    statement: |
      For any $\mathbf{M} \in \mathbb{S}^{d\times d}$ and $\mathbf{V} \in \mathbb{R}^{d\times r}$ with $\mathbf{V}^\top\mathbf{V} = \mathbf{I}_r$,
      \[
        \lambda_{d-r+k}(\mathbf{M}) \leq \lambda_k(\mathbf{V}^\top\mathbf{M}\mathbf{V}) \leq \lambda_k(\mathbf{M}) \quad \text{for all } k \in [r].
      \]
    context: "Eigenvalues of a principal submatrix interlace with those of the full matrix. When $r = d-1$, eigenvalues of $\mathbf{VMV}^\top$ interlace those of $\mathbf{M}$. Used to analyze rank-$r$ projections."

  - type: corollary
    number: "5"
    name: "Weyl's inequality"
    statement: |
      Let $\mathbf{M}, \mathbf{N} \in \mathbb{S}^{d\times d}$. For all $k \in [d]$,
      \[
        \lambda_k(\mathbf{M}) + \lambda_d(\mathbf{N}) \leq \lambda_k(\mathbf{M} + \mathbf{N}) \leq \lambda_k(\mathbf{M}) + \lambda_1(\mathbf{N}).
      \]
    context: "Eigenvalue perturbation inequality: the $k$-th eigenvalue of a sum is sandwiched by the $k$-th eigenvalue of one summand shifted by the extreme eigenvalues of the other. Key tool in matrix perturbation analysis."

  - type: corollary
    number: "6"
    name: ""
    statement: |
      Let $f : I \to \mathbb{R}$ be monotone nondecreasing for $I \subseteq \mathbb{R}$, and let $\mathbf{M}, \mathbf{N} \in \mathbb{S}^{d\times d}$ have all their eigenvalues in $I$. If $\mathbf{M} \preceq \mathbf{N}$, then $\operatorname{Tr}(f(\mathbf{M})) \leq \operatorname{Tr}(f(\mathbf{N}))$.
    context: "Trace is monotone under the Löwner order when composed with a scalar monotone function. Used in the matrix MGF method to bound $\mathbb{E}[\operatorname{Tr}\exp(\theta\mathbf{Z})]$ and in the proof of Theorem 11."

  - type: theorem
    number: "5"
    name: "Löwner-Heinz"
    statement: |
      Let $f : \mathbb{R}_{>0} \to \mathbb{R}$ be identified with its operator counterpart.
      1. If $f(x) = x^p$ for $p \in [-1, 0]$, $f$ is operator convex and $-f$ is operator monotone.
      2. If $f(x) = x^p$ for $p \in [0, 1]$, or $f(x) = \log x$, $f$ is operator monotone and operator concave.
      3. If $f(x) = x^p$ for $p \in [1, 2]$, or $f(x) = x\log x$, $f$ is operator convex.
    context: "Characterizes which power functions and logarithm are operator monotone or convex. Used to justify trace inequalities and to apply operator convexity/monotonicity in matrix calculus."

  - type: theorem
    number: "6"
    name: "von Neumann trace inequality"
    statement: |
      Let $\mathbf{M}, \mathbf{N} \in \mathbb{S}^{d\times d}$ have eigendecompositions $\mathbf{M} = \mathbf{U}\mathbf{\Lambda}\mathbf{U}^\top$ and $\mathbf{N} = \mathbf{V}\mathbf{\Lambda}'\mathbf{V}^\top$ given by Theorem 4, where $\mathbf{\Lambda} = \mathbf{diag}(\boldsymbol{\lambda})$, $\mathbf{\Lambda}' = \mathbf{diag}(\boldsymbol{\lambda}')$, and the eigenvalues $\{\lambda_i\}_{i\in[d]}$, $\{\lambda_i'\}_{i\in[d]}$ are sorted in nondecreasing order. Then
      \[
        \sum_{i\in[d]}\lambda_i\lambda_{d+1-i}' \leq \langle\mathbf{M},\mathbf{N}\rangle \leq \sum_{i\in[d]}\lambda_i\lambda_i'.
      \]
      The upper and lower bounds respectively hold iff $\mathbf{U} = \mathbf{V}$ and iff columns of $\mathbf{U}$, $\mathbf{V}$ are reversed.
    context: "The Frobenius inner product is extremized when eigenvectors are aligned (upper bound, achieved when matrices commute with same ordering) or anti-aligned (lower bound). Yields matrix Cauchy-Schwarz (equation 12) and the disentangling inequality (13)."
    proof_notes:
      - label: "(11)"
        content: |
          $\langle\mathbf{M},\mathbf{N}\rangle = \langle\mathbf{S},\mathbf{T}\rangle \in [\langle\mathbf{S}^-,\mathbf{T}\rangle, \langle\mathbf{S}^+,\mathbf{T}\rangle]$,
          where $\mathbf{S}^- \in \operatorname{argmin}_{\mathbf{S}\in\mathcal{S}}\langle\mathbf{S},\mathbf{T}\rangle$, $\mathbf{S}^+ \in \operatorname{argmax}_{\mathbf{S}\in\mathcal{S}}\langle\mathbf{S},\mathbf{T}\rangle$, and $\mathcal{S}$ is the set of doubly stochastic matrices.
        description: "Reduces the extremal inner product problem to optimizing a linear function over doubly stochastic matrices; extrema are permutation matrices by the Birkhoff-von Neumann theorem, yielding the rearrangement inequality."
      - label: "(12)"
        content: |
          $\langle\mathbf{M},\mathbf{N}\rangle \leq \|\mathbf{M}\|\,\|\mathbf{N}\|_*$, for all unitarily invariant norms $\|\cdot\|$, $\mathbf{M},\mathbf{N}\in\mathbb{R}^{d\times d}$.
        description: "Matrix Cauchy-Schwarz / Hölder inequality for unitarily invariant norms; in particular recovers the Schatten-$p$/$q$ Hölder inequality."
      - label: "(13)"
        content: |
          $\operatorname{Tr}(\mathbf{MNMN}) \leq \operatorname{Tr}(\mathbf{M}^2\mathbf{N}^2)$ for $\mathbf{M},\mathbf{N}\in\mathbb{S}^{d\times d}$.
        description: "Disentangling inequality for symmetric matrices; a consequence of matrix Cauchy-Schwarz and the cyclic property of trace. Used as the base case for the Lieb-Thirring inequality."

  - type: lemma
    number: "7"
    name: "Extended Lieb-Thirring inequality"
    statement: |
      Let $\mathbf{M}, \mathbf{N} \in \mathbb{S}_{\succeq\mathbf{0}}^{d\times d}$ and $\alpha \in (0,1)$. Then
      \[
        \operatorname{Tr}(\mathbf{M}^\alpha\mathbf{N}\mathbf{M}^{1-\alpha}\mathbf{N}) \leq \operatorname{Tr}(\mathbf{M}\mathbf{N}^2).
      \]
    context: "Disentangling lemma for PSD matrices with fractional powers; a building block toward the Golden-Thompson inequality. Recovers equation (13) when $\mathbf{N} \leftarrow \mathbf{M}^{1/2}$."

  - type: proposition
    number: "3"
    name: "Lieb-Thirring inequality"
    statement: |
      Let $\mathbf{M}, \mathbf{N} \in \mathbb{S}_{\succeq\mathbf{0}}^{d\times d}$ and $p \geq 1$. Then $\operatorname{Tr}((\mathbf{MN})^p) \leq \operatorname{Tr}(\mathbf{M}^p\mathbf{N}^p)$.
    context: "Disentangling inequality: products of PSD matrices can be separated at the cost of an inequality. Used to prove the Golden-Thompson inequality (Theorem 7) via a limiting argument."

  - type: theorem
    number: "7"
    name: "Golden-Thompson inequality"
    statement: |
      Let $\mathbf{M}, \mathbf{N} \in \mathbb{S}^{d\times d}$. Then
      \[
        \operatorname{Tr}(\exp(\mathbf{M} + \mathbf{N})) \leq \operatorname{Tr}(\exp(\mathbf{M})\exp(\mathbf{N})).
      \]
    context: "Key disentangling inequality for matrix exponentials. Used in matrix concentration to relate $\operatorname{Tr}\exp(\sum_i\mathbf{Z}_i)$ to a product of individual MGFs; note the scalar analog is an equality."
    proof_notes:
      - label: "(14)"
        content: |
          $\operatorname{Tr}(\exp(\mathbf{M} + \mathbf{N})) \leq \operatorname{Tr}(\exp(\mathbf{M})\exp(\mathbf{N}))$.
        description: "Proven by taking $p\to\infty$ in Proposition 3: $\exp(\mathbf{M}+\mathbf{N}) = \lim_{p\to\infty}(\exp(\frac{1}{p}\mathbf{M})\exp(\frac{1}{p}\mathbf{N}))^p$, then applying the Lieb-Thirring inequality."

  - type: theorem
    number: "8"
    name: "Lewis's theorem"
    statement: |
      Let $f_{\mathrm{vec}} : \mathbb{R}^d \to \mathbb{R}$ be permutation-invariant, convex, closed, and proper. Then $f : \mathbb{S}^{d\times d} \to \mathbb{R}$ identified with $f_{\mathrm{vec}}$ is permutation-invariant, convex, closed, and proper. Further, for $\mathbf{M}, \mathbf{N} \in \mathbb{S}_{\succeq\mathbf{0}}^{d\times d}$ with eigendecompositions $\mathbf{M} = \mathbf{U}\mathbf{\Lambda}\mathbf{U}^\top$, $\mathbf{N} = \mathbf{V}\mathbf{\Lambda}'\mathbf{V}^\top$, where $\mathbf{\Lambda} = \mathbf{diag}(\boldsymbol{\lambda})$, $\mathbf{\Lambda}' = \mathbf{diag}(\boldsymbol{\lambda}')$, we have $\mathbf{N} \in \partial f(\mathbf{M})$ iff $\boldsymbol{\lambda}' \in \partial f_{\mathrm{vec}}(\boldsymbol{\lambda})$, $\mathbf{U} = \mathbf{V}$.
    context: "Characterizes the subdifferential of spectral functions via their scalar counterparts. Gives $\nabla(\frac{1}{2}\|\mathbf{M}\|_F^2) = \mathbf{M}$ and $\nabla(\operatorname{Tr}(\exp(\mathbf{M}))) = \exp(\mathbf{M})$."

  - type: theorem
    number: "9"
    name: "Lewis-Sendov formula"
    statement: |
      Let $f_{\mathrm{vec}} : \mathbb{R}^d \to \mathbb{R}$ be permutation-invariant. Then the operator function $f : \mathbb{S}^{d\times d} \to \mathbb{R}$ identified with $f_{\mathrm{vec}}$ is permutation-invariant. Moreover, for any $\mathbf{M} \in \mathbb{S}_{\succeq\mathbf{0}}^{d\times d}$ with eigendecomposition $\mathbf{M} = \mathbf{U}\mathbf{\Lambda}\mathbf{U}^\top$ where $\mathbf{\Lambda} = \mathbf{diag}(\boldsymbol{\lambda})$, $f$ is twice-differentiable at $\mathbf{M}$ iff $f_{\mathrm{vec}}$ is twice-differentiable at $\boldsymbol{\lambda}$. In this case, $\nabla^2 f(\mathbf{M})$ operates on $\mathbf{N} \in \mathbb{S}^{d\times d}$ via
      \[
        \nabla^2 f(\mathbf{M})[\mathbf{N}] = \mathbf{U}\!\left(\mathbf{diag}\!\left(\!\left\{\frac{\partial^2}{\partial\lambda_i^2}f_{\mathrm{vec}}(\boldsymbol{\lambda})\cdot\widetilde{\mathbf{N}}_{ii}\right\}_{i\in[d]}\right) + \mathbf{A} \circ \widetilde{\mathbf{N}}\right)\!\mathbf{U}^\top,
      \]
      where $\mathbf{A}_{ij} = \begin{cases}0 & i = j \\ \nabla^2_{ij}f_{\mathrm{vec}}(\boldsymbol{\lambda}) - \nabla^2_{ii}f_{\mathrm{vec}}(\boldsymbol{\lambda}) & i\neq j,\,\lambda_i = \lambda_j \\ \frac{\nabla_i f_{\mathrm{vec}}(\boldsymbol{\lambda}) - \nabla_j f_{\mathrm{vec}}(\boldsymbol{\lambda})}{\lambda_i - \lambda_j} & i\neq j,\,\lambda_i\neq\lambda_j\end{cases}$ and $\widetilde{\mathbf{N}} := \mathbf{U}^\top\mathbf{N}\mathbf{U}$.
    context: "Formula for the matrix Hessian of a spectral function. Used to compute second-order information for Newton methods and other second-order algorithms on matrix domains."

  - type: proposition
    number: "4"
    name: "Quantum KL divergence"
    statement: |
      Define the quantum KL divergence between $\mathbf{M}, \mathbf{N} \in \mathbb{S}_{>0}^{d\times d}$ by
      \[
        D_H(\mathbf{N}\|\mathbf{M}) := \operatorname{Tr}(\mathbf{N}(\log\mathbf{N} - \log\mathbf{M}) + \mathbf{M} - \mathbf{N}).
      \]
      Then $D_H : \mathbb{S}_{>0}^{d\times d} \times \mathbb{S}_{>0}^{d\times d} \to \mathbb{R}$ is a jointly convex function of its inputs.
    context: "Matrix analog of KL divergence / Bregman divergence for the log-det barrier. Its joint convexity is used to prove Lieb's concavity theorem (Theorem 10), which in turn yields the matrix MGF bound (Corollary 7)."

  - type: theorem
    number: "10"
    name: "Lieb's concavity theorem"
    statement: |
      For $\mathbf{S} \in \mathbb{S}^{d\times d}$, the following is concave on $\mathbb{S}_{>0}^{d\times d}$:
      \[
        f(\mathbf{X}) = \operatorname{Tr}\exp(\mathbf{S} + \log(\mathbf{X})).
      \]
    context: "Key tool in the matrix MGF method. Used to apply Jensen's inequality in the matrix setting when conditioning on partial sums in Corollary 7."

  - type: lemma
    number: "8"
    name: ""
    statement: |
      Let $\mathbf{Z} \in \mathbb{S}^{d\times d}$ be a random matrix. Then
      \[
        \Pr[\lambda_1(\mathbf{Z}) \geq t] \leq \inf_{\theta>0}\exp(-\theta t)\,\mathbb{E}[\operatorname{Tr}\exp(\theta\mathbf{Z})],
      \]
      \[
        \Pr[\lambda_d(\mathbf{Z}) \leq t] \leq \inf_{\theta<0}\exp(-\theta t)\,\mathbb{E}[\operatorname{Tr}\exp(\theta\mathbf{Z})].
      \]
    context: "Matrix analog of the scalar MGF method (Fact 1 + Theorem 1 proof). The master lemma for all matrix concentration bounds; combined with Corollary 7 and matrix MGF bounds to derive Theorems 11 and 12."

  - type: corollary
    number: "7"
    name: ""
    statement: |
      Let $\{\mathbf{Z}_i\}_{i\in[n]} \subseteq \mathbb{S}^{d\times d}$ be independent random matrices and $\theta \in \mathbb{R}$. Then
      \[
        \mathbb{E}\!\left[\operatorname{Tr}\exp\!\left(\theta\sum_{i\in[n]}\mathbf{Z}_i\right)\right] \leq \operatorname{Tr}\exp\!\left(\sum_{i\in[n]}\log\mathbb{E}[\exp(\theta\mathbf{Z}_i)]\right).
      \]
    context: "Matrix analog of the scalar MGF factorization for independent summands. Replaces Golden-Thompson (which fails for three or more matrices) by using Lieb's concavity (Theorem 10) iteratively. The key reduction in the proofs of Theorems 11 and 12."

  - type: lemma
    number: "9"
    name: ""
    statement: |
      Let $\mathbf{Z} \in \mathbb{S}^{d\times d}$ be a random matrix satisfying $\mathbb{E}\mathbf{Z} = \mathbf{0}_d$ and $\|\mathbf{Z}\|_{\mathrm{op}} \leq c$ with probability 1. Then for all $|\theta| \leq \frac{1}{2c}$, we have $\log\mathbb{E}[\exp(\theta\mathbf{Z})] \preceq \theta^2\mathbb{E}[\mathbf{Z}^2]$.
    context: "Matrix analog of Lemma 2 (sub-gamma MGF bound for bounded variables). The key ingredient for the Matrix Bernstein inequality (Theorem 11); bounds the log-MGF of each summand in Corollary 7."

  - type: theorem
    number: "11"
    name: "Matrix Bernstein's inequality"
    statement: |
      Let $\{\mathbf{Z}_i\}_{i\in[n]} \subseteq \mathbb{S}^{d\times d}$ be independent random matrices satisfying $\mathbb{E}\mathbf{Z}_i = \mathbf{0}_d$ and $\|\mathbf{Z}_i\|_{\mathrm{op}} \leq c$ with probability 1. Further, let $\mathbf{Z} := \sum_{i\in[n]}\mathbf{Z}_i$, and suppose $\mathbb{E}\sum_{i\in[n]}\mathbf{Z}_i^2 \preceq \sigma^2\mathbf{I}_d$. Then for all $t \geq 0$,
      \[
        \Pr\!\left[\|\mathbf{Z}\|_{\mathrm{op}} \geq t\right] \leq 2d\exp\!\left(-\min\!\left(\frac{t^2}{4\sigma^2},\,\frac{t}{4c}\right)\right).
      \]
    context: "Matrix analog of Bernstein's inequality (Theorem 2) for sums of bounded mean-zero symmetric matrices. The $d$ factor in the prefactor reflects a union bound over eigenvalues. Extended to asymmetric matrices via a tiling argument (Remark 4)."

  - type: lemma
    number: "10"
    name: ""
    statement: |
      Let $\mathbf{Z} \in \mathbb{S}_{\succeq\mathbf{0}}^{d\times d}$ be a random matrix satisfying $\lambda_1(\mathbf{Z}) \leq R$ with probability 1. Then for all $\theta \in \mathbb{R}$, we have $\log\mathbb{E}[\exp(\theta\mathbf{Z})] \preceq \frac{\exp(\theta R)-1}{R}\mathbb{E}[\mathbf{Z}]$.
    context: "Matrix analog of the Chernoff MGF bound for PSD random matrices. Key ingredient for Matrix Chernoff (Theorem 12)."

  - type: theorem
    number: "12"
    name: "Matrix Chernoff bound"
    statement: |
      Let $\{\mathbf{Z}_i\}_{i\in[n]} \subseteq \mathbb{S}^{d\times d}$ be independent random matrices satisfying $\|\mathbf{Z}_i\|_{\mathrm{op}} \leq R$ with probability 1, and let $\mathbf{Z} := \sum_{i\in[n]}\mathbf{Z}_i$. Then,
      \[
        \Pr[\lambda_1(\mathbf{Z}) \geq (1+\epsilon)\mu_{\max}] \leq d\exp\!\left(-\frac{\epsilon^2\mu_{\max}}{(2+\epsilon)R}\right) \quad \text{for all } \epsilon \geq 0,\ \text{where } \mu_{\max} := \lambda_1(\mathbb{E}\mathbf{Z}),
      \]
      \[
        \Pr[\lambda_d(\mathbf{Z}) \leq (1-\epsilon)\mu_{\min}] \leq d\exp\!\left(-\frac{\epsilon^2\mu_{\min}}{2R}\right) \quad \text{for all } \epsilon \in (0,1),\ \text{where } \mu_{\min} := \lambda_d(\mathbb{E}\mathbf{Z}).
      \]
    context: "Matrix analog of the Chernoff bound (Theorem 3) for sums of bounded PSD random matrices. Controls the largest and smallest eigenvalues of a random matrix sum. Proves Theorem 3 as the special case $d=1$."

  - type: fact
    number: "1"
    name: "Markov and Chebyshev"
    statement: |
      If $Z$ is a nonneg random variable, $\Pr[Z \geq t] \leq \frac{1}{t}\mathbb{E}Z$ for all $t \geq 0$. If $Z$ is a random variable taking values in $\mathbb{R}$, $\Pr[|Z - \mathbb{E}Z| \geq t] \leq \frac{1}{t^2}\operatorname{Var}[Z]$.
    context: "Basic moment-based concentration inequalities. Markov's inequality is invoked in essentially every concentration proof in the notes (Theorems 1, 2, 3, Lemma 8)."

  - type: fact
    number: "2"
    name: ""
    statement: |
      If $\{Z_i\}_{i\in[n]}$ are real-valued random variables such that $Z_i$ is $\sigma_i^2$-sub-Gaussian for all $i \in [n]$, then the random variable $\sum_{i\in[n]}Z_i$ is $\sum_{i\in[n]}\sigma_i^2$-sub-Gaussian.
    context: "Sums of independent sub-Gaussian variables are sub-Gaussian with variance parameters adding. Combined with Lemma 1 to show Rademacher sums are $O(n)$-sub-Gaussian."

  - type: fact
    number: "3"
    name: ""
    statement: |
      If $\{Z_i\}_{i\in[n]}$ are real-valued random variables such that $Z_i$ is $(\sigma_i^2, c_i)$-sub-gamma for all $i \in [n]$, then the random variable $\sum_{i\in[n]}Z_i$ is $(\sum_{i\in[n]}\sigma_i^2,\,\max_{i\in[n]}c_i)$-sub-gamma.
    context: "Sums of independent sub-gamma variables are sub-gamma. Used in the proof of Corollary 1 (Johnson-Lindenstrauss) together with Lemma 3."

  - type: fact
    number: "4"
    name: "Schur complement characterization of positive definiteness"
    statement: |
      For a square matrix $\mathbf{M}$ partitioned into $2\times 2$ blocks as $\mathbf{M} = \begin{pmatrix}\mathbf{M}_{11} & \mathbf{M}_{12} \\ \mathbf{M}_{21} & \mathbf{M}_{22}\end{pmatrix}$, if $\mathbf{M}_{11}$ and $\mathbf{M}_{22}$ are invertible, define the Schur complement onto the top-left block by $\mathrm{SC}_1(\mathbf{M}) := \mathbf{M}_{11} - \mathbf{M}_{12}\mathbf{M}_{22}^{-1}\mathbf{M}_{21}$, and the Schur complement onto the bottom-right block by $\mathrm{SC}_2(\mathbf{M}) := \mathbf{M}_{22} - \mathbf{M}_{21}\mathbf{M}_{11}^{-1}\mathbf{M}_{12}$. Then $\mathbf{M}$ is positive definite iff $\mathrm{SC}_1(\mathbf{M})$, $\mathrm{SC}_2(\mathbf{M})$ are both positive definite.
    context: "Used to verify positive definiteness of block matrices, and to derive the partially-minimized quadratic form over partitioned variables."

  - type: remark
    number: "4"
    name: "Asymmetric Matrix Bernstein via tiling"
    statement: |
      Theorem 11 extends to sums of asymmetric random matrices via a tiling argument. Specifically, suppose $\{\mathbf{A}_i\}_{i\in[n]} \in \mathbb{R}^{d_1\times d_2}$ are independent random matrices satisfying $\mathbb{E}\mathbf{A}_i = \mathbf{0}_{d_1\times d_2}$ and $\|\mathbf{A}_i\|_{\mathrm{op}} \leq c$ for all $i \in [n]$. Then let $d = d_1 + d_2$, and for each $i \in [n]$ define
      \[
        \mathbf{Z}_i := \begin{pmatrix}\mathbf{0}_{d_1} & \mathbf{A}_i \\ \mathbf{A}_i^\top & \mathbf{0}_{d_2}\end{pmatrix}.
      \]
      It is simple to check that $\|\mathbf{Z}_i\|_{\mathrm{op}} = \|\mathbf{A}_i\|_{\mathrm{op}}$, $\mathbb{E}\mathbf{Z}_i = \mathbf{0}_d$, and
      \[
        \mathbb{E}\!\left[\sum_{i\in[n]}\mathbf{Z}_i^2\right] = \begin{pmatrix}\mathbb{E}[\sum_{i\in[n]}\mathbf{A}_i\mathbf{A}_i^\top] & \mathbf{0}_{d_1\times d_2} \\ \mathbf{0}_{d_2\times d_1} & \mathbb{E}[\sum_{i\in[n]}\mathbf{A}_i^\top\mathbf{A}_i]\end{pmatrix}.
      \]
      Thus, Theorem 11 applies and depends on $\sigma^2 \geq \max(\lambda_1(\mathbb{E}\sum_{i\in[n]}\mathbf{A}_i\mathbf{A}_i^\top),\, \lambda_1(\mathbb{E}\sum_{i\in[n]}\mathbf{A}_i^\top\mathbf{A}_i))$.
    context: "Reduction from asymmetric to symmetric matrix Bernstein via symmetrization; the matrix variance parameter is the larger of $\|\mathbb{E}\mathbf{A}\mathbf{A}^\top\|_{\mathrm{op}}$ and $\|\mathbb{E}\mathbf{A}^\top\mathbf{A}\|_{\mathrm{op}}$."
