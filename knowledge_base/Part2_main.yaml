source: "Part2_main.pdf"
lecture_number: 2
title: "CS395T: Continuous Algorithms, Part II — Gradient Descent"
items:
  - type: lemma
    number: "1"
    name: ""
    statement: |
      No algorithm $\mathcal{A}$ which accesses a target $f: [0,1] \to [0,1]$ using a value oracle can
      optimize $f$ to additive error $< 1$ in a finite number of queries.
    context: "Lower bound showing value oracles alone are insufficient without regularity assumptions. Motivates Lipschitz conditions."

  - type: definition
    number: "1"
    name: "Lipschitzness"
    statement: |
      We say $f: \mathcal{X} \to \mathbb{R}$ is $L$-Lipschitz with respect to the norm $\|\cdot\|$ if
      \[
        |f(\mathbf{x}) - f(\mathbf{x}')| \leq L \|\mathbf{x} - \mathbf{x}'\| \quad \text{for all } \mathbf{x}, \mathbf{x}' \in \mathcal{X}.
      \]
      If $\|\cdot\| = \|\cdot\|_2$, we simply say $f$ is $L$-Lipschitz.
    context: "Regularity condition quantifying how fast $f$ can change. Controls subgradient norms (Lemma 2) and optimization difficulty."

  - type: lemma
    number: "2"
    name: ""
    statement: |
      Let $f: \mathcal{X} \to \mathbb{R}$ be convex and $L$-Lipschitz for $\mathcal{X} \subseteq \mathbb{R}^d$, and let
      $\mathbf{x} \in \mathrm{relint}(\mathcal{X})$ and $\mathbf{g} \in \partial f(\mathbf{x})$ be contained in the
      lowest-dimensional subspace containing $\mathcal{X}$. Then $\|\mathbf{g}\|_2 \leq L$.
      Conversely, if for every $\mathbf{x} \in \mathrm{relint}(\mathcal{X})$ and every $\mathbf{g} \in \partial f(\mathbf{x})$
      in the lowest-dimensional subspace containing $\mathcal{X}$, we have $\|\mathbf{g}\|_2 \leq L$, then $f$ is
      $L$-Lipschitz over $\mathrm{relint}(\mathcal{X})$.
    context: "Characterizes Lipschitz convex functions via subgradient norms. The bound $\|\mathbf{g}\|_2 \leq L$ is used repeatedly in the projected subgradient descent analysis (Theorem 2)."

  - type: lemma
    number: "3"
    name: ""
    statement: |
      Let $f(\mathbf{x}) = \|\mathbf{x}\|$ for some norm $\|\cdot\|$. Then $f$ is 1-Lipschitz with respect to $\|\cdot\|$.
    context: "Canonical example of a Lipschitz function; follows from the triangle inequality."

  - type: definition
    number: "2"
    name: "Packings and coverings"
    statement: |
      Let $S, T \subset \mathbb{R}^d$ and $\epsilon > 0$.
      - $\{T_i\}_{i \in [n]}$ is an $\epsilon$-packing of $S$ by $T$ if $T_i = \{\mathbf{x}_i\} \oplus \epsilon T$ for
        $\{\mathbf{x}_i\} \subset S$, and $T_i \cap T_j = \emptyset$ for $i \neq j$.
      - $\{T_i\}_{i \in [n]}$ is an $\epsilon$-covering of $S$ by $T$ if $T_i = \{\mathbf{x}_i\} \oplus \epsilon T$ for
        $\{\mathbf{x}_i\} \subset S$, and $\bigcup_{i \in [n]} T_i \supseteq S$.
    context: "Used to construct lower bound hard instances for Lipschitz optimization (Lemmas 4, 5)."

  - type: lemma
    number: "4"
    name: ""
    statement: |
      Let $\{T_i\}_{i \in [n]} = \{\{\mathbf{x}_i\} \oplus \epsilon T\}_{i \in [n]}$ be a maximal $\epsilon$-packing of $S$ by $T$
      (i.e., no $\{\mathbf{x}'\} \oplus \epsilon T$ can be added while remaining a packing). Further suppose $T$ is convex
      and symmetric ($\mathbf{x} \in T \iff -\mathbf{x} \in T$). Then $\{\{\mathbf{x}_i\} \oplus 2\epsilon T\}_{i \in [n]}$
      is a $2\epsilon$-covering of $S$ by $T$.
    context: "Maximal packings are coverings at twice the radius; used to bound packing cardinalities."

  - type: corollary
    number: "1"
    name: ""
    statement: |
      For any $\epsilon \in (0,1)$, there is an $\epsilon$-packing of $S \subset \mathbb{R}^d$ by $S$ of cardinality
      $\geq \left(\frac{1}{2\epsilon}\right)^d$.
    context: "Packing lower bound used in Lemma 5 to establish the oracle complexity lower bound for Lipschitz optimization."

  - type: lemma
    number: "5"
    name: ""
    statement: |
      Let $L > \epsilon > 0$. No algorithm $\mathcal{A}$ accessing a target $L$-Lipschitz function
      $f: \mathbb{B}(\mathbf{0}_d, 1) \to \mathbb{R}$ using a value oracle can optimize $f$ to additive error $\epsilon$
      in $< \left(\frac{L}{2\epsilon}\right)^d - 1$ queries.
    context: "Value-oracle lower bound for Lipschitz optimization; shows exponential query complexity in $d$."

  - type: theorem
    number: "1"
    name: "Lipschitz convex lower bound"
    statement: |
      Let $\epsilon, L, R > 0$. No algorithm $\mathcal{A}$ accessing a target $L$-Lipschitz, convex function
      $f: \mathbb{B}(\mathbf{0}_d, R) \to \mathbb{R}$ using a subgradient oracle $\mathcal{O}$ and producing iterates
      $\{\mathbf{x}_t\}_{0 \leq t < T}$ can optimize $f$ to additive error $\epsilon$ using
      $T < \min\!\left(d, \left(\frac{LR}{4\epsilon}\right)^2\right)$ queries, subject to
      \[
        \mathbf{x}_0 = \mathbf{0}_d, \quad \mathbf{x}_t \in \operatorname{Span}\!\left(\{\mathcal{O}(\mathbf{x}_s)\}_{0 \leq s < t}\right)
        \quad \text{for all } t \in [T]. \tag{1}
      \]
    context: "Subgradient oracle lower bound for Lipschitz convex optimization. The bound $\Omega((LR/\epsilon)^2)$ matches Theorem 2 up to constants. Extends to $\alpha$-strongly convex $f$ with bound $\Omega(\min(d, L^2/(\alpha\epsilon)))$."
    proof_notes:
      - label: "(2)"
        content: |
          f(\mathbf{x}) := \gamma \max_{i \in [T]} \mathbf{x}_i + \frac{\alpha}{2} \|\mathbf{x}\|_2^2
        description: "Nemirovski's function: the hard instance used to prove the lower bound. It is $(\gamma + \alpha R)$-Lipschitz and convex, with $\partial f(\mathbf{x}) = \gamma \cdot \mathrm{Conv}(\{\mathbf{e}_i \mid i \in \operatorname{argmax}_{j \leq T} \mathbf{x}_j\}) + \alpha\mathbf{x}$. The key property is that iterates under (1) are supported on the first $t$ coordinates, so the oracle reveals one new coordinate per query."

  - type: theorem
    number: "2"
    name: "Projected gradient descent"
    statement: |
      Let $f: \mathcal{X} \to \mathbb{R}$ be convex and $L$-Lipschitz for $\mathcal{X} \subseteq \mathbb{B}(\mathbf{0}_d, R)$.
      Consider iterating
      \[
        \mathbf{g}_t \in \partial f(\mathbf{x}_t), \quad \mathbf{x}_{t+1} \leftarrow \Pi_{\mathcal{X}}(\mathbf{x}_t - \eta \mathbf{g}_t) \tag{3}
      \]
      for $0 \leq t < T$, from $\mathbf{x}_0 \leftarrow \mathbf{0}_d$ with $\eta = \frac{R}{L\sqrt{T}}$, and let
      $\bar{\mathbf{x}} := \frac{1}{T}\sum_{0 \leq t < T} \mathbf{x}_t$. Then
      \[
        f(\bar{\mathbf{x}}) - \min_{\mathbf{x} \in \mathcal{X}} f(\mathbf{x}) \leq \frac{LR}{\sqrt{T}}.
      \]
    context: "Optimal-rate algorithm for Lipschitz convex optimization matching Theorem 1 up to constants (when $d \geq (LR/\epsilon)^2$). Prefers the 'low-accuracy' regime where $\epsilon$ is not too small."
    proof_notes:
      - label: "(4)"
        content: |
          \langle \eta\mathbf{g}_t + (\mathbf{x}_{t+1} - \mathbf{x}_t), \mathbf{x}_{t+1} - \mathbf{u} \rangle \leq 0
          \quad \text{for all } \mathbf{u} \in \mathcal{X}
        description: "First-order optimality condition for the projection step $\mathbf{x}_{t+1} = \Pi_{\mathcal{X}}(\mathbf{x}_t - \eta\mathbf{g}_t)$, by Lemma 2 (Part I). Used to derive the per-step progress bound."
      - label: "Per-step telescoping"
        content: |
          \langle \eta\mathbf{g}_t, \mathbf{x}_t - \mathbf{u} \rangle
          \leq \frac{1}{2}\|\mathbf{x}_t - \mathbf{u}\|_2^2 - \frac{1}{2}\|\mathbf{x}_{t+1} - \mathbf{u}\|_2^2 + \frac{\eta^2 L^2}{2}
        description: "Per-iteration inequality; summing over $t$ and dividing by $\eta T$ gives the final bound. Uses Cauchy-Schwarz, Young's inequality, and $\|\mathbf{g}_t\|_2 \leq L$ from Lemma 2."

  - type: remark
    number: "1"
    name: ""
    statement: |
      Theorem 1 further shows that $\Omega(\min(d, \frac{L^2}{\alpha\epsilon}))$ queries are necessary when $f$ is
      both $L$-Lipschitz and $\alpha$-strongly convex. This lower bound is also optimal; see [LSB12, RSS12].
    context: "Notes the tight lower bound in the strongly convex Lipschitz setting."

  - type: definition
    number: "3"
    name: "Smoothness"
    statement: |
      We say $f: \mathbb{R}^d \to \mathbb{R}$ is $L$-smooth with respect to the norm $\|\cdot\|$, or $L$-smooth in $\|\cdot\|$,
      if $f$ is differentiable and $\nabla f$ is $L$-Lipschitz in the sense that
      \[
        \|\nabla f(\mathbf{x}') - \nabla f(\mathbf{x})\|_* \leq L\|\mathbf{x} - \mathbf{x}'\| \quad \text{for all } \mathbf{x}, \mathbf{x}' \in \mathbb{R}^d.
      \]
      If $\|\cdot\| = \|\cdot\|_* = \|\cdot\|_2$, we simply say $f$ is $L$-smooth.
    context: "First-order stability of $\nabla f$; enables quadratic upper bounds on $f$ (Lemma 6) and progress guarantees for gradient descent."

  - type: lemma
    number: "6"
    name: ""
    statement: |
      If $f: \mathbb{R}^d \to \mathbb{R}$ is differentiable and convex, then $f$ is $L$-smooth iff for all
      $\mathbf{x}, \mathbf{x}' \in \mathbb{R}^d$,
      \[
        f(\mathbf{x}') \leq f(\mathbf{x}) + \langle \nabla f(\mathbf{x}), \mathbf{x}' - \mathbf{x} \rangle + \frac{L}{2} \|\mathbf{x}' - \mathbf{x}\|_2^2. \tag{6}
      \]
      If $f$ is twice-differentiable (possibly nonconvex), $f$ is $L$-smooth iff $|\nabla^2 f(\mathbf{x})[\mathbf{v},\mathbf{v}]| \leq L\|\mathbf{v}\|_2^2$
      for all $\mathbf{x}, \mathbf{v} \in \mathbb{R}^d$.
    context: "Quadratic upper bound characterization of smoothness; (6) is the workhorse inequality for gradient descent analyses. The bound (6) holds even without convexity."
    proof_notes:
      - label: "(6)"
        content: |
          f(\mathbf{x}') \leq f(\mathbf{x}) + \langle \nabla f(\mathbf{x}), \mathbf{x}' - \mathbf{x} \rangle + \frac{L}{2} \|\mathbf{x}' - \mathbf{x}\|_2^2
        description: "The quadratic upper bound from smoothness. Key tool: directly minimizing the right side over $\mathbf{x}'$ yields Corollary 2."
      - label: "(7)"
        content: |
          f(\mathbf{x}') - f(\mathbf{x}) - \langle \nabla f(\mathbf{x}), \mathbf{x}' - \mathbf{x} \rangle
          \leq \int_0^1 \|\nabla f(\mathbf{x}_\lambda) - \nabla f(\mathbf{x})\|_2 \|\mathbf{x}' - \mathbf{x}\|_2 \, \mathrm{d}\lambda
          \leq \frac{L}{2}\|\mathbf{x}' - \mathbf{x}\|_2^2
        description: "Cauchy-Schwarz + smoothness bound used in the proof that smoothness implies (6). The same calculation (with $-L$) shows the lower bound $f(\mathbf{x}') \geq f(\mathbf{x}) + \langle \nabla f(\mathbf{x}), \mathbf{x}' - \mathbf{x} \rangle - \frac{L}{2}\|\mathbf{x}'-\mathbf{x}\|_2^2$."

  - type: corollary
    number: "2"
    name: ""
    statement: |
      Let $f: \mathbb{R}^d \to \mathbb{R}$ be $L$-smooth. Then for any $\mathbf{x} \in \mathbb{R}^d$, letting
      $\mathbf{x}' \leftarrow \mathbf{x} - \frac{1}{L}\nabla f(\mathbf{x})$,
      \[
        f(\mathbf{x}') \leq f(\mathbf{x}) - \frac{1}{2L}\|\nabla f(\mathbf{x})\|_2^2.
      \]
    context: "Per-step progress guarantee for gradient descent. Directly implies Theorem 3 (smooth gradient descent) and Lemma 7 (stationary point finding)."

  - type: lemma
    number: "7"
    name: ""
    statement: |
      Let $f: \mathbb{R}^d \to \mathbb{R}$ be $L$-smooth, let $\epsilon > 0$, and suppose for $\mathbf{x}_0 \in \mathbb{R}^d$
      we have $f(\mathbf{x}_0) - \min_{\mathbf{x} \in \mathbb{R}^d} f(\mathbf{x}) \leq \Delta$. Then iterating
      $\mathbf{x}_{t+1} \leftarrow \mathbf{x}_t - \frac{1}{L}\nabla f(\mathbf{x}_t)$ for $0 \leq t < T$ where
      $T \geq \frac{2L\Delta}{\epsilon^2}$,
      \[
        \min_{0 \leq t < T} \|\nabla f(\mathbf{x}_t)\|_2 \leq \epsilon.
      \]
    context: "Gradient descent finds $\epsilon$-stationary points for smooth (possibly nonconvex) functions in $O(L\Delta/\epsilon^2)$ steps; optimal [CDHS20]."

  - type: theorem
    number: "3"
    name: "Smooth gradient descent"
    statement: |
      Let $f: \mathbb{R}^d \to \mathbb{R}$ be $L$-smooth and convex, and suppose $\|\mathbf{x}_0 - \mathbf{x}^*\|_2 \leq R$
      for $\mathbf{x}^* \in \operatorname{argmin}_{\mathbf{x} \in \mathbb{R}^d} f(\mathbf{x})$. Iterating
      $\mathbf{x}_{t+1} \leftarrow \mathbf{x}_t - \frac{1}{L}\nabla f(\mathbf{x}_t)$ for $0 \leq t < T$,
      \[
        f(\mathbf{x}_T) - f(\mathbf{x}^*) \leq \frac{2LR^2}{T}.
      \]
    context: "Suboptimal rate for smooth convex optimization (Theorem 5 gives a matching lower bound $\Omega(LR^2/T^2)$ for the well-conditioned case, and Lemma 11 shows reduction to well-conditioned). Prefer center-of-gravity in high-accuracy regime."
    proof_notes:
      - label: "Potential recurrence"
        content: |
          \Phi_{t+1} \leq \Phi_t - \frac{1}{2L}\left(\frac{\Phi_t}{R}\right)^2
          \implies \frac{1}{\Phi_{t+1}} - \frac{1}{\Phi_t} \geq \frac{1}{2LR^2\Phi_{t+1}}
          \implies \frac{T}{2LR^2} \leq \frac{1}{\Phi_T}
        description: "The telescoping argument via the potential $\Phi_t := f(\mathbf{x}_t) - f(\mathbf{x}^*)$ and convexity bound $\Phi_t \leq \|\nabla f(\mathbf{x}_t)\|_2 R$. Yields $\Phi_T \leq 2LR^2/T$."

  - type: lemma
    number: "8"
    name: ""
    statement: |
      Let $f: \mathbb{R}^d \to \mathbb{R}$ be $L$-smooth and convex, and let $\mathbf{x}' \leftarrow \mathbf{x} - \eta\nabla f(\mathbf{x})$
      for $\eta \leq \frac{1}{L}$. Then for $\mathbf{x}^* \in \operatorname{argmin}_{\mathbf{x} \in \mathbb{R}^d} f(\mathbf{x})$,
      \[
        \|\mathbf{x}' - \mathbf{x}^*\|_2 \leq \|\mathbf{x} - \mathbf{x}^*\|_2.
      \]
    context: "Contractivity of gradient descent toward the minimizer; used in Theorem 3 to maintain $\|\mathbf{x}_t - \mathbf{x}^*\|_2 \leq R$ for all $t$."

  - type: fact
    number: "1"
    name: "Grönwall's inequality"
    statement: |
      If $\Phi_0 \geq 0$ and $\frac{\mathrm{d}}{\mathrm{d}t}\Phi_t \leq -C\Phi_t$ for all $t \geq 0$, then
      $\Phi_t \leq \exp(-Ct)\Phi_0$.
    context: "Continuous-time analog of geometric convergence; motivates the gradient domination condition (8) and the Lyapunov argument for linear convergence in the well-conditioned setting."

  - type: definition
    number: "4"
    name: "Strong convexity"
    statement: |
      We say $f: \mathcal{X} \to \mathbb{R}$ is $\mu$-strongly convex with respect to the norm $\|\cdot\|$ if for all
      $\mathbf{x}, \mathbf{x}' \in \mathcal{X}$,
      \[
        f((1-\lambda)\mathbf{x} + \lambda\mathbf{x}') \leq (1-\lambda)f(\mathbf{x}) + \lambda f(\mathbf{x}') - \frac{\mu\lambda(1-\lambda)}{2}\|\mathbf{x} - \mathbf{x}'\|^2.
      \]
      If $\|\cdot\| = \|\cdot\|_2$, we simply say $f$ is $\mu$-strongly convex. When $\mu = 0$, this recovers standard convexity.
    context: "Enforces that $f$ is overestimated by linear functions by at least a quadratic factor; gives linear convergence rates. For $f(\mathbf{x}) = \frac{1}{2}\mathbf{x}^\top \mathbf{A} \mathbf{x}$ with $\mathbf{A} \in \mathbb{S}^{d \times d}_{\succ 0}$, $\mu$ is the smallest eigenvalue of $\mathbf{A}$."

  - type: lemma
    number: "9"
    name: ""
    statement: |
      If $f: \mathbb{R}^d \to \mathbb{R}$ is differentiable, then $f$ is $\mu$-strongly convex iff for all
      $\mathbf{x}, \mathbf{x}' \in \mathbb{R}^d$,
      \[
        f(\mathbf{x}') \geq f(\mathbf{x}) + \langle \nabla f(\mathbf{x}), \mathbf{x}' - \mathbf{x} \rangle + \frac{\mu}{2}\|\mathbf{x}' - \mathbf{x}\|_2^2. \tag{9}
      \]
      If $f$ is twice-differentiable, $f$ is $\mu$-strongly convex iff $\nabla^2 f(\mathbf{x})[\mathbf{v},\mathbf{v}] \geq \mu\|\mathbf{v}\|_2^2$
      for all $\mathbf{x}, \mathbf{v} \in \mathbb{R}^d$.
    context: "First-order characterization of strong convexity; analogous to Lemma 1 (Part I) for convexity. Equation (9) gives quadratic lower bounds on $f$ and implies Corollary 3."
    proof_notes:
      - label: "(9)"
        content: |
          f(\mathbf{x}') \geq f(\mathbf{x}) + \langle \nabla f(\mathbf{x}), \mathbf{x}' - \mathbf{x} \rangle + \frac{\mu}{2}\|\mathbf{x}' - \mathbf{x}\|_2^2
        description: "Quadratic lower bound on $f$ from strong convexity. Can be cited directly to lower-bound $f(\mathbf{x}') - f(\mathbf{x})$. For non-differentiable $f$, replace $\nabla f(\mathbf{x})$ with any $\mathbf{g} \in \partial f(\mathbf{x})$ (Remark 2)."

  - type: remark
    number: "2"
    name: ""
    statement: |
      For convex, non-differentiable $f: \mathbb{R}^d \to \mathbb{R}$, $\mu$-strong convexity is equivalent to
      \[
        f(\mathbf{x}') \geq f(\mathbf{x}) + \langle \mathbf{g}, \mathbf{x}' - \mathbf{x} \rangle + \frac{\mu}{2}\|\mathbf{x}' - \mathbf{x}\|_2^2
        \quad \text{for all } \mathbf{g} \in \partial f(\mathbf{x}).
      \]
    context: "Extension of Lemma 9's first-order characterization to non-differentiable strongly convex functions."

  - type: corollary
    number: "3"
    name: ""
    statement: |
      Let $f: \mathbb{R}^d \to \mathbb{R}$ be $\mu$-strongly convex, and let $\mathbf{x}^* := \operatorname{argmin}_{\mathbf{x} \in \mathbb{R}^d} f(\mathbf{x})$.
      Then
      \[
        f(\mathbf{x}) - f(\mathbf{x}^*) \leq \frac{1}{2\mu}\|\nabla f(\mathbf{x})\|_2^2.
      \]
    context: "Gradient domination (Polyak-Łojasiewicz condition) for strongly convex $f$; implies bound (8) with $C = 2\mu$, giving linear convergence of gradient flow. Combined with Corollary 2 yields Theorem 4."

  - type: theorem
    number: "4"
    name: "Well-conditioned gradient descent"
    statement: |
      Let $f: \mathbb{R}^d \to \mathbb{R}$ be $L$-smooth and $\mu$-strongly convex, let
      $\mathbf{x}^* := \operatorname{argmin}_{\mathbf{x} \in \mathbb{R}^d} f(\mathbf{x})$, and let $\kappa := \frac{L}{\mu} \geq 1$.
      Iterating $\mathbf{x}_{t+1} \leftarrow \mathbf{x}_t - \frac{1}{L}\nabla f(\mathbf{x}_t)$ for $0 \leq t < T$,
      \[
        f(\mathbf{x}_T) - f(\mathbf{x}^*) \leq \left(1 - \frac{1}{\kappa}\right)^T (f(\mathbf{x}_0) - f(\mathbf{x}^*)).
      \]
    context: "Linear convergence for well-conditioned ($L$-smooth, $\mu$-strongly convex) functions; $\kappa = L/\mu$ is the condition number. Gives dimension-free rate $O(\kappa \log(1/\epsilon))$ iterations to reach $\epsilon$ error."
    proof_notes:
      - label: "(10)"
        content: |
          f(\mathbf{x}_{t+1}) - f(\mathbf{x}^*) \leq \left(1 - \frac{1}{\kappa}\right)(f(\mathbf{x}_t) - f(\mathbf{x}^*))
        description: "Per-iteration contraction; follows directly from Corollaries 2 and 3. Inductive application gives Theorem 4."

  - type: remark
    number: "3"
    name: ""
    statement: |
      Theorem 4 only uses strong convexity through Corollary 3, which can hold for non-convex functions as well.
      Bounds of the form $\|\nabla f(\mathbf{x})\|_2^2 \geq C(f(\mathbf{x}) - f(\mathbf{x}^*))$ are called gradient domination
      or Polyak-Łojasiewicz (PL) conditions [XLS17, HM17]. Gradient domination implies quadratic growth (9) around $\mathbf{x}^*$.
    context: "Situates Theorem 4 in the broader PL/gradient domination literature."

  - type: definition
    number: "5"
    name: "Laplacian"
    statement: |
      Let $G = (V, E, \mathbf{w})$ be an undirected graph with vertices $V$, edges $E$, and edge weights
      $\mathbf{w} \in \mathbb{R}^E_{\geq 0}$. Let $\mathbf{D}_G \in \mathbb{R}^{V \times V}$ be the diagonal degree matrix with
      $[\mathbf{D}_G]_{vv} = \sum_{e=(u,v) \in E} \mathbf{w}_e$, and let $\mathbf{A}_G \in \mathbb{R}^{V \times V}$ be the
      weighted adjacency matrix with $[\mathbf{A}_G]_{uv} = \mathbf{w}_{(u,v)}$. The Laplacian is
      $\mathbf{L}_G := \mathbf{D}_G - \mathbf{A}_G$.
    context: "Used to construct the hard instance for the well-conditioned lower bound (Theorem 5)."

  - type: lemma
    number: "10"
    name: ""
    statement: |
      Let $G = (V, E, \mathbf{w})$ be an undirected graph. Then for any $\mathbf{x} \in \mathbb{R}^V$,
      \[
        \mathbf{x}^\top \mathbf{L}_G \mathbf{x} = \sum_{e=(u,v) \in E} \mathbf{w}_e (\mathbf{x}_u - \mathbf{x}_v)^2.
      \]
    context: "Quadratic form of the Laplacian; used to verify smoothness and strong convexity of the Laplacian-based hard instance in Theorem 5."

  - type: theorem
    number: "5"
    name: "Well-conditioned lower bound"
    statement: |
      Let $\kappa \geq 1$ and $\epsilon \in (0,1)$. No algorithm $\mathcal{A}$ accessing a target $L$-smooth,
      $\mu$-strongly convex function $f$ with $\kappa = L/\mu$ using a gradient oracle $\mathcal{O}$ can optimize $f$
      to additive error $\epsilon(f(\mathbf{x}_0) - \min_{\mathbf{x} \in \mathbb{R}^d} f(\mathbf{x}))$ using
      $T < \frac{\sqrt{\kappa}-1}{2}\log\!\left(\frac{1}{\kappa\epsilon}\right)$ queries subject to restriction (1).
    context: "Tight lower bound for well-conditioned optimization; shows gradient descent (Theorem 4) is suboptimal by a $\sqrt{\kappa}$ factor. Acceleration (Part V) achieves the optimal $O(\sqrt{\kappa}\log(1/\epsilon))$ rate."
    proof_notes:
      - label: "(11)"
        content: |
          \mathbf{L}_G[\mathbf{v},\mathbf{v}] = \sum_{i \in [d-1]} (\mathbf{v}_i - \mathbf{v}_{i+1})^2 \leq 4\|\mathbf{v}\|_2^2
        description: "Bound showing the path-graph Laplacian satisfies $\mathbf{L}_G \preceq 4\mathbf{I}_d$, used to verify the hard instance $f(\mathbf{x}) = \frac{\kappa-1}{8}(\mathbf{x}^\top \mathbf{L}_G \mathbf{x} - 2\langle \mathbf{e}_1, \mathbf{x}\rangle) + \frac{1}{2}\|\mathbf{x}\|_2^2$ is $\kappa$-smooth."
      - label: "(12)"
        content: |
          f(\mathbf{x}) - f(\mathbf{x}^*) \geq \frac{1}{2}\|\mathbf{x} - \mathbf{x}^*\|_2^2 \geq \frac{1}{2}\sum_{i \in [d] \setminus [T]} [\mathbf{x}^*]_i^2
        description: "For iterates supported on first $T$ coordinates (by (1)), strong convexity gives a lower bound on $f(\mathbf{x}) - f(\mathbf{x}^*)$ in terms of the unobserved coordinates of $\mathbf{x}^*$."

  - type: lemma
    number: "11"
    name: ""
    statement: |
      Suppose there is an algorithm $\mathcal{A}$ taking input $\mathbf{x}_0 \in \mathbb{R}^d$ and an $L$-smooth, convex
      $f: \mathbb{R}^d \to \mathbb{R}$ (accessed via gradient oracle), producing $\mathbf{x} \in \mathbb{R}^d$ using $T$ queries
      such that for constants $C, c > 0$,
      \[
        f(\mathbf{x}) - f(\mathbf{x}^*) \leq \frac{CL\|\mathbf{x}_0 - \mathbf{x}^*\|_2^2}{T^c}.
      \]
      Then there is an algorithm $\mathcal{A}'$ taking input $\mathbf{x}_0 \in \mathbb{R}^d$ and an $L$-smooth, $\mu$-strongly
      convex $f$ with $\kappa = L/\mu$, producing $\mathbf{x}$ with $f(\mathbf{x}) - f(\mathbf{x}^*) \leq \epsilon(f(\mathbf{x}_0) - f(\mathbf{x}^*))$
      in $O(\kappa^{1/c}\log\frac{1}{\epsilon})$ queries.
    context: "Reduction from well-conditioned to smooth convex optimization; with $c=1$ (Theorem 3), gives $O(\kappa\log(1/\epsilon))$ queries, matching Theorem 4. Implies that $c > 2$ for $\mathcal{A}$ would contradict Theorem 5 (Remark 4)."

  - type: remark
    number: "4"
    name: ""
    statement: |
      Lemma 11 is a reduction from well-conditioned optimization to smooth convex optimization, and is
      lossless in the other direction as well [ZH16]. Theorem 3 gives $c=1$; if $c > 2$ were achievable, it
      would contradict Theorem 5. Combined with [ZH16], this implies a variant of Theorem 3 with convergence
      rate $O(LR^2/T^c)$ achieves the optimal $\sqrt{\kappa}$ dependence via $O(\sqrt{\kappa}\log(1/\epsilon))$ queries.
    context: "Tight equivalence between smooth convex and well-conditioned settings."

  - type: definition
    number: "6"
    name: "Dual norm"
    statement: |
      For a norm $\|\cdot\|$ on $\mathbb{R}^d$, the dual norm is
      \[
        \|\cdot\|_* := \max_{\|\mathbf{x}\| \leq 1} \langle \mathbf{x}, \cdot \rangle.
      \]
      The dual of $\|\cdot\|_p$ is $\|\cdot\|_q$ for $\frac{1}{p}+\frac{1}{q}=1$ ($q=\infty$ if $p=1$; $\ell_2$ is self-dual).
      For $\mathbf{A} \in \mathbb{S}^{d \times d}_{\succ 0}$ and $\|\mathbf{x}\|_\mathbf{A} := (\mathbf{x}^\top \mathbf{A} \mathbf{x})^{1/2}$,
      the dual is $\|\cdot\|_{\mathbf{A}^{-1}}$.
    context: "Generalization of Euclidean inner-product geometry to arbitrary norms; $\|\cdot\|_*$ appears in the gradient Lipschitz condition and the smooth descent guarantee (Corollary 4)."

  - type: fact
    number: "2"
    name: "Riesz's lemma"
    statement: |
      For any norm $\|\cdot\|$ on $\mathbb{R}^d$, the unit norm ball $\mathbb{B}_{\|\cdot\|}(1)$ is compact.
      Therefore, for all $\mathbf{y} \in \mathbb{R}^d$ there is $\mathbf{x} \in \mathbb{R}^d$ achieving $\|\mathbf{x}\| = 1$
      and $\langle \mathbf{x}, \mathbf{y} \rangle = \|\mathbf{y}\|_*$.
    context: "Compactness of unit ball in finite dimensions; ensures dual norm is attained."

  - type: lemma
    number: "12"
    name: ""
    statement: |
      For any norm $\|\cdot\|$ on $\mathbb{R}^d$, $\|\cdot\|_*$ is a norm, and $\langle \mathbf{x}, \mathbf{y} \rangle \leq \|\mathbf{x}\|\|\mathbf{y}\|_*$
      for $\mathbf{x}, \mathbf{y} \in \mathbb{R}^d$. Moreover, $\|\cdot\|_{**} = \|\cdot\|$.
    context: "Generalized Cauchy-Schwarz for dual norms; $\|\cdot\|_{**} = \|\cdot\|$ allows switching between a norm and its bidual."

  - type: lemma
    number: "13"
    name: ""
    statement: |
      If $f: \mathcal{X} \to \mathbb{R}$ is convex and $L$-Lipschitz (with respect to $\|\cdot\|$),
      $\mathbf{x} \in \mathrm{relint}(\mathcal{X})$, and $\mathbf{g} \in \partial f(\mathbf{x})$, then $\|\mathbf{g}\|_* \leq L$.
    context: "Generalization of Lemma 2 to arbitrary norms: subgradient norms (in the dual) are bounded by the Lipschitz constant."

  - type: lemma
    number: "14"
    name: ""
    statement: |
      If $f: \mathbb{R}^d \to \mathbb{R}$ is differentiable and convex, then $f$ is $L$-smooth with respect to $\|\cdot\|$ iff
      for all $\mathbf{x}, \mathbf{x}' \in \mathbb{R}^d$,
      \[
        f(\mathbf{x}') \leq f(\mathbf{x}) + \langle \nabla f(\mathbf{x}), \mathbf{x}' - \mathbf{x} \rangle + \frac{L}{2}\|\mathbf{x}' - \mathbf{x}\|^2.
      \]
      If twice-differentiable (possibly nonconvex), $L$-smooth in $\|\cdot\|$ iff $|\nabla^2 f(\mathbf{x})[\mathbf{v},\mathbf{v}]| \leq L\|\mathbf{v}\|^2$.
      If differentiable, $f$ is $\mu$-strongly convex with respect to $\|\cdot\|$ iff for all $\mathbf{x}, \mathbf{x}' \in \mathbb{R}^d$,
      \[
        f(\mathbf{x}') \geq f(\mathbf{x}) + \langle \nabla f(\mathbf{x}), \mathbf{x}' - \mathbf{x} \rangle + \frac{\mu}{2}\|\mathbf{x}' - \mathbf{x}\|^2.
      \]
      If twice-differentiable, $\mu$-strongly convex in $\|\cdot\|$ iff $\nabla^2 f(\mathbf{x})[\mathbf{v},\mathbf{v}] \geq \mu\|\mathbf{v}\|^2$.
    context: "Unified first/second-order characterizations of smoothness and strong convexity for general norms; generalizations of Lemmas 6 and 9."

  - type: corollary
    number: "4"
    name: ""
    statement: |
      Let $f: \mathbb{R}^d \to \mathbb{R}$ be $L$-smooth with respect to $\|\cdot\|$. Then for any $\mathbf{x} \in \mathbb{R}^d$,
      letting $\mathbf{x}' \leftarrow \operatorname{argmin}_{\mathbf{x}' \in \mathbb{R}^d} f(\mathbf{x}) + \langle \nabla f(\mathbf{x}), \mathbf{x}' - \mathbf{x} \rangle + \frac{L}{2}\|\mathbf{x}' - \mathbf{x}\|^2$,
      \[
        f(\mathbf{x}') \leq f(\mathbf{x}) - \frac{1}{2L}\|\nabla f(\mathbf{x})\|_*^2.
      \]
    context: "Generalization of Corollary 2 to arbitrary norms; the step is $\mathbf{x}' = \mathbf{x} - \frac{1}{L}\|\nabla f(\mathbf{x})\|_* \mathbf{v}$ where $\|\mathbf{v}\|=1$ and $\langle \nabla f(\mathbf{x}), \mathbf{v}\rangle = \|\nabla f(\mathbf{x})\|_*$."

  - type: theorem
    number: "6"
    name: "Smooth gradient descent in general norms"
    statement: |
      Let $f: \mathbb{R}^d \to \mathbb{R}$ be $L$-smooth with respect to $\|\cdot\|$ and convex. Suppose for
      $\mathbf{x}_0 \in \mathbb{R}^d$, $\max_{\mathbf{x} \in \mathbb{R}^d: f(\mathbf{x}) \leq f(\mathbf{x}_0)} \|\mathbf{x} - \mathbf{x}^*\| \leq R$
      for $\mathbf{x}^* \in \operatorname{argmin}_{\mathbf{x} \in \mathbb{R}^d} f(\mathbf{x})$. Iterating
      \[
        \mathbf{x}_{t+1} \leftarrow \mathbf{x}_t - \frac{1}{L}\|\nabla f(\mathbf{x}_t)\|_* \mathbf{v}_t,
        \quad \langle \nabla f(\mathbf{x}_t), \mathbf{v}_t \rangle = \|\nabla f(\mathbf{x}_t)\|_*, \; \|\mathbf{v}_t\|=1,
      \]
      for $0 \leq t < T$,
      \[
        f(\mathbf{x}_T) - f(\mathbf{x}^*) \leq \frac{2LR^2}{T}.
      \]
    context: "Generalization of Theorem 3 to arbitrary norms due to [KLOS14]. The slightly stronger starting assumption (sublevel set bound on $\|\mathbf{x} - \mathbf{x}^*\|$) replaces the Euclidean contractivity argument (Lemma 8) which no longer holds generally."

  - type: definition
    number: "7"
    name: "Proximal oracle"
    statement: |
      We say $\mathcal{O}$ is a proximal oracle for $\psi: \mathbb{R}^d \to \mathbb{R}$ if for any $\mathbf{v} \in \mathbb{R}^d$
      and $\lambda \in \mathbb{R}_{\geq 0}$, $\mathcal{O}(\lambda, \mathbf{v})$ returns
      $\operatorname{argmin}_{\mathbf{x} \in \mathbb{R}^d} \frac{\lambda}{2}\|\mathbf{x} - \mathbf{v}\|_2^2 + \psi(\mathbf{x})$.
      When $\psi = \chi_S$, $\mathcal{O}(\lambda, \mathbf{v})$ is the Euclidean projection $\Pi_S(\mathbf{v})$.
    context: "Computational oracle for 'simple' $\psi$ (e.g., indicator functions, $\ell_1$ regularizer); admits linear-time computation for separable $\psi$."

  - type: theorem
    number: "7"
    name: "Proximal well-conditioned gradient descent"
    statement: |
      Let $f: \mathbb{R}^d \to \mathbb{R}$ be $L$-smooth and convex, let $\psi: \mathbb{R}^d \to \mathbb{R}$ admit a proximal
      oracle $\mathcal{O}$, let $F := f + \psi$ be $\mu$-strongly convex, let
      $\mathbf{x}^* := \operatorname{argmin}_{\mathbf{x} \in \mathbb{R}^d} F(\mathbf{x})$, and $\kappa := L/\mu$.
      Iterating
      \[
        \mathbf{x}_{t+1} \leftarrow \operatorname{argmin}_{\mathbf{x} \in \mathbb{R}^d} f(\mathbf{x}_t) + \langle \nabla f(\mathbf{x}_t), \mathbf{x} - \mathbf{x}_t \rangle
        + \frac{L}{2}\|\mathbf{x} - \mathbf{x}_t\|_2^2 + \psi(\mathbf{x}) \tag{14}
      \]
      for $0 \leq t < T$,
      \[
        F(\mathbf{x}_T) - F(\mathbf{x}^*) \leq \left(1 - \frac{1}{\kappa+1}\right)^T (F(\mathbf{x}_0) - F(\mathbf{x}^*)).
      \]
    context: "Proximal gradient descent for composite objectives $F = f + \psi$; generalizes Theorem 4. Each step (14) requires one call to $\mathcal{O}(L, \mathbf{x}_t - \frac{1}{L}\nabla f(\mathbf{x}_t))$."

  - type: theorem
    number: "8"
    name: "Proximal smooth gradient descent"
    statement: |
      Let $f: \mathbb{R}^d \to \mathbb{R}$ be $L$-smooth and convex, let $\psi: \mathbb{R}^d \to \mathbb{R}$ admit a proximal
      oracle $\mathcal{O}$, and let $F := f + \psi$ be convex. Suppose for $\mathbf{x}_0 \in \mathbb{R}^d$,
      $\max_{\mathbf{x} \in \mathbb{R}^d, F(\mathbf{x}) \leq F(\mathbf{x}_0)} \|\mathbf{x} - \mathbf{x}^*\|_2 \leq R$
      for $\mathbf{x}^* \in \operatorname{argmin}_{\mathbf{x} \in \mathbb{R}^d} F(\mathbf{x})$. Iterating (14) for $0 \leq t < T$,
      \[
        F(\mathbf{x}_T) - F(\mathbf{x}^*) \leq \frac{2LR^2}{T-1}.
      \]
    context: "Proximal analog of Theorem 3 for composite objectives without strong convexity; generalizes Theorem 3."
